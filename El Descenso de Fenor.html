<title>El Descenso de Fenor — Stream Reward</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel+Decorative:wght@700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000;
    display:flex; justify-content:center; align-items:center;
    height:100vh; overflow:hidden;
    font-family:'Share Tech Mono',monospace;
  }
  #game-container { position:relative; width:800px; height:600px; }
  canvas { display:block; }
  .vignette {
    position:absolute; inset:0; pointer-events:none; z-index:10;
    background:radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,0.88) 100%);
  }
  .crt {
    position:absolute; inset:0; pointer-events:none; z-index:11;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0.15) 0px,rgba(0,0,0,0.15) 1px,transparent 1px,transparent 2px);
    animation:flicker 0.15s infinite;
  }
  @keyframes flicker {
    0%,100%{opacity:1} 91%{opacity:0.98} 93%{opacity:0.90} 95%{opacity:0.97}
  }
  .noise {
    position:absolute; inset:0; pointer-events:none; z-index:12; opacity:0.045;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:200px 200px;
    animation:noiseAnim 0.18s steps(1) infinite;
  }
  @keyframes noiseAnim {
    0%{background-position:0 0} 20%{background-position:-50px 25px}
    40%{background-position:100px -80px} 60%{background-position:30px 40px}
    80%{background-position:-70px -20px} 100%{background-position:0 0}
  }
  #ui-overlay {
    position:absolute; inset:0; z-index:20;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  #name-panel {
    background:rgba(0,0,0,0.92); border:1px solid #330000;
    padding:24px 32px; text-align:center; color:#cc0000;
    font-family:'Share Tech Mono',monospace; pointer-events:all;
    display:none;
  }
  #name-panel h2 { font-family:'Cinzel Decorative',serif; font-size:18px; margin-bottom:14px; letter-spacing:2px; }
  #name-panel input {
    background:#0a0a0a; border:1px solid #550000; color:#cc0000;
    font-family:'Share Tech Mono',monospace; font-size:16px;
    padding:6px 12px; width:220px; text-align:center; margin-bottom:12px;

  }
  #name-panel .class-row { display:flex; gap:10px; margin-bottom:16px; justify-content:center; }
  .class-btn {

  #chest-overlay .chest-btn {

<body>
<div id="game-container">
  <div class="vignette"></div>
  <div class="crt"></div>
  <div class="noise"></div>
  <div id="ui-overlay">
    <div id="name-panel">
      <h2>IDENTIFICA AL DESCENDIENTE</h2>

  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script>

// ═══════════════════════════════════════════════════════════════
//  AUDIO ENGINE — Dark, atmospheric, no clicks/pops
// ═══════════════════════════════════════════════════════════════
const SFX = (() => {
  let ctx = null;
  function _ctx(){
    if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==='suspended') ctx.resume();
    return ctx;
  }

  // Crea un gain con micro-fade in/out para evitar clicks
  function _gain(ac, vol, start, dur, attack=0.008, release=0.04){
    let g = ac.createGain();
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + attack);
    g.gain.setValueAtTime(vol, start + dur - release);
    g.gain.linearRampToValueAtTime(0.0001, start + dur);
    return g;
  }

  // Masterbus con compresor suave para evitar saturacion
  function _master(ac){
    let comp = ac.createDynamicsCompressor();
    comp.threshold.value = -18;
    comp.knee.value      = 10;
    comp.ratio.value     = 4;
    comp.attack.value    = 0.003;
    comp.release.value   = 0.15;
    comp.connect(ac.destination);
    return comp;
  }

  function _osc(freq, type, start, dur, vol, ac, dest){
    let out = dest || ac.destination;
    let g = _gain(ac, vol, start, dur);
    let o = ac.createOscillator();
    o.type = type;
    o.frequency.setValueAtTime(freq, start);
    o.connect(g); g.connect(out);
    o.start(start); o.stop(start + dur + 0.05);
  }

  function _slide(f0, f1, type, start, dur, vol, ac, dest){
    let out = dest || ac.destination;
    let g = _gain(ac, vol, start, dur);
    let o = ac.createOscillator();
    o.type = type;
    o.frequency.setValueAtTime(f0, start);
    o.frequency.exponentialRampToValueAtTime(f1, start + dur);
    o.connect(g); g.connect(out);
    o.start(start); o.stop(start + dur + 0.05);
  }

  function _noise(start, dur, vol, ac, lp=600, hp=0, dest){
    let out = dest || ac.destination;
    let bufLen = Math.ceil(ac.sampleRate * dur);
    let buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    let d = buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) d[i] = Math.random()*2 - 1;
    let src = ac.createBufferSource(); src.buffer = buf;
    let node = src;
    if(lp){ let f=ac.createBiquadFilter(); f.type='lowpass';  f.frequency.value=lp; node.connect(f); node=f; }
    if(hp){ let f=ac.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp; node.connect(f); node=f; }
    let g = _gain(ac, vol, start, dur, 0.005, 0.05);
    node.connect(g); g.connect(out);
    src.start(start); src.stop(start + dur + 0.05);
  }

  function _vibrato(freq, lfoHz, depth, type, start, dur, vol, ac, dest){
    let out = dest || ac.destination;
    let g = _gain(ac, vol, start, dur);
    let o = ac.createOscillator(); o.type = type; o.frequency.value = freq;
    let lfo = ac.createOscillator(); lfo.frequency.value = lfoHz;
    let lfoG = ac.createGain(); lfoG.gain.value = depth;
    lfo.connect(lfoG); lfoG.connect(o.frequency);
    o.connect(g); g.connect(out);
    lfo.start(start); o.start(start);
    lfo.stop(start+dur+0.05); o.stop(start+dur+0.05);
  }

  function _play(fn){ try{ fn(_ctx()); } catch(e){} }

  // ── MENÚ / NAVEGACIÓN ─────────────────────────────────────

  function btnHover(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _noise(t, 0.06, 0.06, ac, 260, 55, m);
      _osc(78, 'sine', t, 0.05, 0.04, ac, m);
    });
  }

  function btnClick(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _noise(t, 0.09, 0.14, ac, 200, 0, m);
      _slide(100, 32, 'sine', t, 0.12, 0.13, ac, m);
    });
  }

  function gameStart(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      let o=ac.createOscillator();
      let g=_gain(ac, 0.28, t, 2.4, 0.6, 0.8);
      o.type='sine'; o.frequency.value=55;
      o.connect(g); g.connect(m); o.start(t); o.stop(t+2.6);
      _osc(110,'sine',t+0.2,2.0,0.1,ac,m);
      _osc(82,'sine',t+0.4,1.7,0.06,ac,m);
      _noise(t+0.7, 1.4, 0.05, ac, 350, 0, m);
    });
  }

  function sceneTransition(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _slide(80, 22, 'sine', t, 0.35, 0.1, ac, m);
      _noise(t, 0.28, 0.07, ac, 160, 0, m);
      _osc(27, 'sine', t+0.08, 0.4, 0.1, ac, m);
    });
  }

  // ── COMBATE ───────────────────────────────────────────────

  function playerHit(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _noise(t, 0.07, 0.22, ac, 420, 50, m);
      _slide(130, 48, 'sine', t, 0.14, 0.14, ac, m);
      _osc(48, 'sine', t, 0.1, 0.1, ac, m);
    });
  }

  function critHit(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _noise(t, 0.04, 0.3, ac, 3000, 180, m);
      _noise(t+0.035, 0.18, 0.22, ac, 260, 0, m);
      _slide(170, 30, 'sine', t, 0.25, 0.22, ac, m);
      _osc(25, 'sine', t+0.02, 0.3, 0.18, ac, m);
    });
  }

  function miss(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _noise(t, 0.07, 0.06, ac, 1600, 650, m);
      _slide(340, 85, 'sine', t, 0.09, 0.04, ac, m);
    });
  }

  function playerTakesHit(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _noise(t, 0.09, 0.24, ac, 360, 0, m);
      _slide(88, 36, 'sine', t, 0.16, 0.18, ac, m);
      _osc(40, 'sine', t+0.02, 0.22, 0.12, ac, m);
    });
  }

  function limbLost(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _noise(t, 0.04, 0.35, ac, 3800, 300, m);
      _noise(t+0.04, 0.32, 0.28, ac, 130, 0, m);
      _slide(70, 18, 'sine', t, 0.45, 0.24, ac, m);
      _osc(20, 'sine', t+0.06, 0.55, 0.2, ac, m);
      _slide(2600, 1000, 'sine', t+0.07, 0.7, 0.02, ac, m);
    });
  }

  function victory(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _vibrato(110, 3, 6, 'sine', t, 1.4, 0.12, ac, m);
      _osc(73, 'sine', t+0.12, 1.1, 0.08, ac, m);
      _noise(t, 0.3, 0.04, ac, 260, 0, m);
    });
  }

  function bossEncounter(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      for(let i=0;i<5;i++){
        let tt=t+i*0.32;
        _osc(24+(i%2)*8, 'sine', tt, 0.28, 0.18-i*0.02, ac, m);
        _noise(tt, 0.2, 0.05, ac, 160, 0, m);
      }
      _vibrato(34, 6, 11, 'sine', t, 1.7, 0.1, ac, m);
      _noise(t+0.4, 1.3, 0.04, ac, 300, 0, m);
    });
  }

  function enemySpecial(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _vibrato(60, 11, 22, 'sine', t, 0.7, 0.14, ac, m);
      _osc(30, 'sine', t, 0.6, 0.12, ac, m);
      _noise(t+0.15, 0.45, 0.05, ac, 220, 0, m);
    });
  }

  function flee(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      for(let i=0;i<4;i++){
        _noise(t+i*0.08, 0.06, 0.16, ac, 300, 40, m);
        _slide(72-i*7, 26, 'sine', t+i*0.08, 0.07, 0.09, ac, m);
      }
    });
  }

  // ── EVENTOS ───────────────────────────────────────────────

  function eventChoice(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _noise(t, 0.13, 0.05, ac, 1400, 500, m);
      _slide(155, 78, 'sine', t, 0.11, 0.07, ac, m);
    });
  }

  function eventGood(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _vibrato(110, 4, 5, 'sine', t, 0.9, 0.09, ac, m);
      _osc(82, 'sine', t+0.12, 0.7, 0.06, ac, m);
      _noise(t, 0.2, 0.03, ac, 260, 0, m);
    });
  }

  function eventBad(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _osc(50, 'sine', t, 0.7, 0.14, ac, m);
      _osc(53, 'sine', t, 0.7, 0.12, ac, m);
      _noise(t+0.1, 0.55, 0.07, ac, 220, 0, m);
      _slide(110, 26, 'sine', t+0.24, 0.5, 0.1, ac, m);
    });
  }

  function diceRoll(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      for(let i=0;i<10;i++){
        let tt=t+i*0.036+Math.random()*0.018;
        _noise(tt, 0.032, 0.12+Math.random()*0.1, ac, 700+Math.random()*350, 80, m);
        _osc(52+Math.random()*36, 'sine', tt, 0.025, 0.06, ac, m);
      }
    });
  }

  function diceResult(good){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      if(good){
        _vibrato(110, 3, 4, 'sine', t, 0.8, 0.1, ac, m);
        _osc(82, 'sine', t+0.09, 0.6, 0.06, ac, m);
      } else {
        _osc(50, 'sine', t, 0.6, 0.14, ac, m);
        _osc(47, 'sine', t+0.02, 0.65, 0.12, ac, m);
        _noise(t+0.1, 0.45, 0.07, ac, 180, 0, m);
      }
    });
  }

  function advance(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _noise(t, 0.06, 0.12, ac, 250, 0, m);
      _slide(62, 30, 'sine', t, 0.1, 0.12, ac, m);
    });
  }

  // ── MUERTE / GAME OVER ────────────────────────────────────

  function playerDeath(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      for(let i=0;i<3;i++){
        let tt=t+i*0.44*(1+i*0.26);
        _slide(50, 26, 'sine', tt, 0.34, 0.2-i*0.05, ac, m);
        _noise(tt, 0.16, 0.08, ac, 180, 0, m);
      }
      _vibrato(25, 0.5, 3, 'sine', t+1.6, 3.0, 0.14, ac, m);
      _noise(t+1.6, 2.4, 0.04, ac, 130, 0, m);
    });
  }

  function insanityDeath(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      _vibrato(220, 0.5, 3, 'sine', t, 0.5, 0.1, ac, m);
      _vibrato(220, 9,  42, 'sine', t+0.5, 0.6, 0.1, ac, m);
      _vibrato(220, 24, 90, 'sine', t+1.1, 0.9, 0.1, ac, m);
      _noise(t,     0.4,  0.03, ac, 560, 0, m);
      _noise(t+0.5, 0.5,  0.06, ac, 750, 80, m);
      _noise(t+1.0, 1.0,  0.1,  ac, 1050, 160, m);
      _osc(26, 'sine', t+1.2, 1.0, 0.14, ac, m);
    });
  }

  function gameOver(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      let o=ac.createOscillator();
      let g=_gain(ac, 0.3, t, 3.8, 0.08, 1.2);
      o.type='sine'; o.frequency.value=41;
      o.connect(g); g.connect(m); o.start(t); o.stop(t+4.0);
      _osc(82,'sine',t,3.2,0.14,ac,m);
      _osc(61,'sine',t+0.06,3.2,0.09,ac,m);
      _noise(t, 0.3, 0.07, ac, 160, 0, m);
      _osc(41,'sine',t+1.4,2.2,0.07,ac,m);
    });
  }

  function chestOpen(){
    _play(ac=>{ let t=ac.currentTime;
      let m=_master(ac);
      // Nota base que sube levemente — sensación de apertura
      _slide(82, 110, 'sine', t, 0.6, 0.1, ac, m);
      // Vibrato suave encima, igual que victory pero más corto
      _vibrato(110, 3, 5, 'sine', t+0.5, 1.2, 0.1, ac, m);
      // Quinta justa por debajo, da cuerpo sin épica
      _osc(73, 'sine', t+0.6, 1.0, 0.07, ac, m);
      // Toque de ruido muy suave al abrir
      _noise(t, 0.12, 0.05, ac, 800, 0, m);
    });
  }

  return {
    btnClick, btnHover, gameStart, sceneTransition,
    playerHit, critHit, miss, playerTakesHit, limbLost,
    victory, bossEncounter, enemySpecial, flee,
    eventChoice, eventGood, eventBad, diceRoll, diceResult, advance,
    playerDeath, insanityDeath, gameOver, chestOpen
  };
})();

// ═══════════════════════════════════════════════════════════════
//  GLOBALS
// ═══════════════════════════════════════════════════════════════
const W = 800, H = 600;
const C = {
  BLACK:0x000000, DARK:0x0a0a0a, GREY:0x1a1a1a, ASH:0x2d2d2d,
  BONE:0x888888, WHITE:0xcccccc, RED:0x8b0000, BLOOD:0xcc0000, BRIGHT:0xff2222,
};

// ─── CLASSES ────────────────────────────────────────────────────
const CLASSES = [
  {
    id:'guerrero', name:'GUERRERO',
    stats:'TORSO+·CAB+·DMG+5',
    // HP by part: head, torso, armL, armR, legL, legR
    partHp:{head:28, torso:80, armL:32, armR:32, legL:36, legR:36},
    dmg:5, eva:0, acc:0,

  },
  {

    dmg:3, eva:10, acc:15,
    desc:'Preciso y esquivo.'
  },
  {
    id:'berserker', name:'BERSERKER',
    stats:'DMG+12·TORSO-·CAB-',
    partHp:{head:18, torso:50, armL:30, armR:30, legL:32, legR:32},
    dmg:12, eva:0, acc:-5,
    desc:'Daño extremo, frágil.'
  },
  {

    desc:'Esquivo y traicionero. Muerde fuerte.'
  },

// ─── INSANITY DEATH MESSAGES ────────────────────────────────────
const INSANITY_MSGS = [
  'Tu mente cedió a la locura.\nNadie te recordará.',
  'Las voces ganaron.\nEl descenso te consumió desde adentro.',
  'No moriste.\nSimplemente dejaste de ser.',
  'La oscuridad no te mató.\nTú se la diste voluntariamente.',
  'Tus últimas palabras no eran tuyas.\nAlgo más las dijo con tu boca.',
  'El nombre que tenías ya no existe.\nLo que queda no merece uno.',

// ─── PLAYER NAME & CLASS ────────────────────────────────────────
let PLAYER_NAME = 'DESCENDIENTE';
let PLAYER_CLASS = CLASSES[0];

// ─── STATE ──────────────────────────────────────────────────────
const STATE = {
  reset(){
    let cls = PLAYER_CLASS;
    let ph = cls.partHp;
    // All parts have independent HP pools
    // torso/head death = game over; limbs = penalties only
    this.parts = {
      head:  {cur:ph.head,  max:ph.head,  severed:false},
      torso: {cur:ph.torso, max:ph.torso, severed:false},
      armL:  {cur:ph.armL,  max:ph.armL,  severed:false},
      armR:  {cur:ph.armR,  max:ph.armR,  severed:false},
      legL:  {cur:ph.legL,  max:ph.legL,  severed:false},
      legR:  {cur:ph.legR,  max:ph.legR,  severed:false},
    };
    this.level = 1;
    this.log = [];
    this.gold = 0;
    this.buffs = {
      evasion: cls.eva,
      damage: cls.dmg,
      accuracy: cls.acc,
    };
    this.sanity = 100;
    this.deathCause = 'combat';
    this.classId = cls.id;
    this.coinUsed = false;
  },
  addLog(msg){
    this.log.unshift(msg);
    if(this.log.length>60) this.log.pop();
  },
  // Distribute healing across all parts that are below max (including head & torso)
  // Only distributes to non-severed parts
  healDistribute(amount){
    let msgs = [];
    // Find parts that need healing and are not severed (limbs can be severed, head/torso won't be severed but can be low)
    let needy = Object.entries(this.parts).filter(([k,p])=> !p.severed && p.cur < p.max);
    if(needy.length === 0) return ['Ya estás al máximo en todo.'];
    let share = Math.floor(amount / needy.length);
    let remainder = amount - share * needy.length;
    needy.forEach(([k,p],i)=>{
      let gain = share + (i===0?remainder:0);
      let actual = Math.min(gain, p.max - p.cur);
      p.cur += actual;
      if(actual>0) msgs.push(`+${actual} ${partName(k)}`);
    });
    return msgs;
  },
  getSanityPenalties(){
    if(this.sanity>=50) return {acc:0,dmg:0};
    let factor=(50-this.sanity)/50;
    return { acc:Math.round(factor*30), dmg:Math.round(factor*10) };
  },
  getLimbPenalties(){
    let accLimb=0, eva=0;
    let p=this.parts;
    if(p.armL.severed) accLimb+=25;
    if(p.armR.severed) accLimb+=25;
    if(p.armL.severed&&p.armR.severed) accLimb+=15;
    if(p.legL.severed||p.legR.severed) eva+=30;
    if(p.legL.severed&&p.legR.severed) eva+=20;
    if(p.head.severed) accLimb+=50;
    let san=this.getSanityPenalties();
    let accSan=san.acc;
    let accBuff=this.buffs.accuracy||0;
    // acc neto para cálculos de combate
    let acc=Math.max(0, accLimb+accSan-accBuff);
    return {acc, eva, accLimb, accSan, accBuff};
  },
  getTotalDmgPenalty(){ return this.getSanityPenalties().dmg; },
  // Returns true if this part kill caused death
  damagePart(partKey, dmg){
    let p = this.parts[partKey];
    if(!p || p.severed) return false;
    p.cur = Math.max(0, p.cur - dmg);
    return p.cur <= 0;
  },
  // Sever a limb (not torso)
  severLimb(partKey){
    let p = this.parts[partKey];
    if(!p || partKey==='torso') return false;
    p.severed = true;
    p.cur = 0;
    return true;
  },
  isAlive(){
    return this.parts.head.cur > 0 && !this.parts.head.severed
        && this.parts.torso.cur > 0;
  },
};
STATE.reset();

// ─── HELPERS ────────────────────────────────────────────────────
function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function chance(pct){ return Math.random()*100 < pct; }
function partName(k){ return {head:'Cabeza',torso:'Torso',armL:'Brazo Izq.',armR:'Brazo Der.',legL:'Pierna Izq.',legR:'Pierna Der.',nucleo:'Núcleo',masa:'Masa',tallo:'Tallo'}[k]||k; }
function sanColor(s){ return s>60?'#22aa22':s>30?'#aaaa00':'#cc0000'; }
function clampSanity(){ STATE.sanity=Math.max(0,Math.min(100,STATE.sanity)); }

// ─── LOOT TABLE ─────────────────────────────────────────────────
const LOOT_TABLE = [
  { weight:5,  prize:'★ KEY DE STEAM x2',           icon:'🎮🎮', color:'#ffcc00' },
  { weight:8,  prize:'★ KEY DE STEAM',               icon:'🎮',   color:'#ffaa00' },
  { weight:15, prize:'ROL SOBREVIVIENTE en Discord', icon:'🏆',   color:'#44aaff' },
  { weight:5,  prize:'COFRE VACÍO',                  icon:'💀',   color:'#444444', empty:true },
];
function rollLoot(){
  let total=LOOT_TABLE.reduce((s,l)=>s+l.weight,0);
  let r=Math.random()*total;
  let acc=0;
  for(let l of LOOT_TABLE){ acc+=l.weight; if(r<acc) return l; }
  return LOOT_TABLE[LOOT_TABLE.length-1];
}

class SceneMenu extends Phaser.Scene {
  constructor(){ super('SceneMenu'); }
  create(){
    this.add.rectangle(W/2,H/2,W,H,C.BLACK);
    for(let i=0;i<22;i++){
      let x=rnd(20,780), y=rnd(0,80), h2=rnd(50,220);
      this.add.rectangle(x,y+h2/2,2,h2,C.RED,0.55);
      this.add.circle(x,y+h2,4,C.RED,0.75);
    }
    this.add.text(W/2,155,'EL\nDESCENSO',{
      fontFamily:'Cinzel Decorative',fontSize:'72px',color:'#cc0000',align:'center',
      stroke:'#000',strokeThickness:6,shadow:{color:'#ff0000',blur:30,fill:true}
    }).setOrigin(0.5);
    this.add.text(W/2,308,'— DE FENOR —',{
      fontFamily:'Share Tech Mono',fontSize:'15px',color:'#555555',letterSpacing:6
    }).setOrigin(0.5);
    this.add.text(W/2,355,'Cordura y extremidades no garantizadas.',{
      fontFamily:'Share Tech Mono',fontSize:'13px',color:'#666666',align:'center'
    }).setOrigin(0.5);
    let btn=this.add.text(W/2,455,'[ INICIAR ]',{
      fontFamily:'Share Tech Mono',fontSize:'21px',color:'#cc0000',stroke:'#000',strokeThickness:3
    }).setOrigin(0.5).setInteractive({useHandCursor:true});
    btn.on('pointerover',()=>{btn.setColor('#ff4444');btn.setScale(1.05);SFX.btnHover();});
    btn.on('pointerout', ()=>{btn.setColor('#cc0000');btn.setScale(1);});
    btn.on('pointerdown',()=>{SFX.btnClick();this._showNamePanel();});
    this.tweens.add({targets:btn,alpha:{from:0.4,to:1},duration:800,yoyo:true,repeat:-1});
  }
  _showNamePanel(){
    let row=document.getElementById('class-row');
    row.innerHTML='';
    let sel=PLAYER_CLASS.id;
    CLASSES.forEach(cls=>{
      let d=document.createElement('div');
      d.className='class-btn'+(cls.id===sel?' selected':'');
      d.innerHTML=`<div class="cls-name">${cls.name}</div><div class="cls-stats">${cls.stats}</div>`;
      d.onclick=()=>{
        PLAYER_CLASS=cls;
        document.querySelectorAll('.class-btn').forEach(b=>b.classList.remove('selected'));
        d.classList.add('selected');
      };
      row.appendChild(d);
    });
    document.getElementById('player-name-input').value='';
    document.getElementById('name-panel').style.display='block';
    let startBtn=document.getElementById('start-btn');
    startBtn.onclick=null; // clear any previous handler
    startBtn.onclick=()=>{
      let name=document.getElementById('player-name-input').value.trim();
      PLAYER_NAME=name||'DESCENDIENTE';
      document.getElementById('name-panel').style.display='none';
      STATE.reset();
      SFX.gameStart();
      this.cameras.main.fadeOut(400,0,0,0);
      this.time.delayedCall(400,()=>this.scene.start('SceneMap'));
    };
  }
}

// ═══════════════════════════════════════════════════════════════
class SceneMap extends Phaser.Scene {
  constructor(){ super('SceneMap'); }
  create(){
    this.cameras.main.fadeIn(400,0,0,0);
    this.add.rectangle(W/2,H/2,W,H,C.BLACK);

    let lvl=STATE.level;
    this._drawNodes(lvl);
    this._drawStatus();
    this._drawLog();

    if(lvl>=7){ this._showChestScreen(); return; }

    if(lvl===6){
      this.add.text(W/2,310,'Las puertas tiemblan.\nAlgo antiguo respira al otro lado.',{
        fontFamily:'Share Tech Mono',fontSize:'17px',color:'#aa0000',align:'center'
      }).setOrigin(0.5);
      let btn=this.add.text(W/2,420,'[ ENFRENTAR AL JEFE ]',{
        fontFamily:'Share Tech Mono',fontSize:'20px',color:'#ff2222',
        stroke:'#000',strokeThickness:2
      }).setOrigin(0.5).setInteractive({useHandCursor:true});
      btn.on('pointerover',()=>{btn.setColor('#ff6666');btn.setScale(1.04);SFX.btnHover();});
      btn.on('pointerout', ()=>{btn.setColor('#ff2222');btn.setScale(1);});
      btn.on('pointerdown',()=>{
        SFX.sceneTransition();
        this.cameras.main.fadeOut(300,0,0,0);
        this.time.delayedCall(300,()=>this.scene.start('SceneBattle',{isBoss:true}));
      });
      this.tweens.add({targets:btn,alpha:{from:0.3,to:1},duration:600,yoyo:true,repeat:-1});
      return;
    }

    let type=chance(45)?'battle':'event';
    const battleDescs=[
      'Se escuchan pasos entre las sombras...',
      'Algo respira donde no debería haber nada.',
      'El suelo cruje bajo un peso que no eres tú.',
      'Un siseo rompe la oscuridad.',
      'Oyes dientes. Muchos dientes.',
      'Una sombra se mueve contra la corriente de luz.',
      'Huele a sangre fresca. No es la tuya... todavía.',
      'Algo te ha estado siguiendo desde el último nivel.',
      'Las paredes sudan. El enemigo ya está aquí.',
      'Escuchas tu propio nombre dicho en una voz equivocada.',
    ];
    const eventDescs=[
      'Algo interrumpe el silencio...',
      'El pasillo cambia. Esto no estaba aquí antes.',
      'Encuentras algo que no debería existir en este lugar.',
      'Una luz parpadeante revela lo que el descenso esconde.',
      'El aire sabe diferente aquí. A decisiones.',
      'Un símbolo grabado en la pared te observa.',
      'Un sonido distante te llama. O te advierte.',
      'El descenso te presenta una elección.',
      'Algo yace en el suelo. No está muerto, solo espera.',
      'Sientes que este momento importará más adelante.',
    ];
    let desc=type==='battle'?battleDescs[rnd(0,battleDescs.length-1)]:eventDescs[rnd(0,eventDescs.length-1)];
    this.add.text(W/2,300,desc,{
      fontFamily:'Share Tech Mono',fontSize:'16px',color:'#666666',align:'center'
    }).setOrigin(0.5);

    let btn=this.add.text(W/2,410,'[ AVANZAR ]',{
      fontFamily:'Share Tech Mono',fontSize:'20px',color:'#cc0000',
      stroke:'#000',strokeThickness:3
    }).setOrigin(0.5).setInteractive({useHandCursor:true});
    btn.on('pointerover',()=>{btn.setColor('#ff4444');btn.setScale(1.05);SFX.btnHover();});
    btn.on('pointerout', ()=>{btn.setColor('#cc0000');btn.setScale(1);});
    btn.on('pointerdown',()=>{
      SFX.sceneTransition();
      this.cameras.main.fadeOut(300,0,0,0);
      this.time.delayedCall(300,()=>this.scene.start(type==='battle'?'SceneBattle':'SceneEvent', type==='battle'?{isBoss:false}:undefined));
    });
    this.tweens.add({targets:btn,alpha:{from:0.4,to:1},duration:800,yoyo:true,repeat:-1});
  }

  _nodeX(i){
    const nodePositions=[95,195,295,395,495,595,700];
    return nodePositions[i-1]||95;
  }

  _drawNodes(lvl){
    // Separador horizontal bajo la franja
    this.add.rectangle(W/2,36,W,1,0x220000,0.6);

    const totalNodes=7;
    const labels=['I','II','III','IV','V','JEFE','☽'];
    const nodeY=24;
    // Centered across full width with even spacing
    const nodePositions=[100,200,300,400,500,610,710];

    // Líneas de conexión
    for(let i=0;i<totalNodes-1;i++){
      let x1=nodePositions[i], x2=nodePositions[i+1];
      let done=(i+1)<lvl;
      this.add.rectangle((x1+x2)/2,nodeY,(x2-x1)-6,1,done?0x660000:0x1a1a1a,done?1:0.25);
    }

    // Nodos
    for(let i=0;i<totalNodes;i++){
      let nx=nodePositions[i], ny=nodeY;
      let isPast=(i+1)<lvl, isCurrent=(i+1)===lvl;
      let isBoss=i===5, isChest=i===6;
      let r=isBoss||isChest?11:8;

      let nodeColor=isPast?0x330000:isCurrent?0xcc0000:0x0d0d0d;
      let borderColor=isPast?0x660000:isCurrent?0xff2222:0x1a1a1a;

      this.add.circle(nx,ny,r+1,0x000000);
      let circle=this.add.circle(nx,ny,r,nodeColor);
      circle.setStrokeStyle(isCurrent?2:1,borderColor,isCurrent?1:isPast?0.8:0.2);

      if(isCurrent){
        this.tweens.add({targets:circle,scaleX:{from:1,to:1.18},scaleY:{from:1,to:1.18},duration:750,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
      }

      let labelCol=isPast?'#441111':isCurrent?'#ff3333':'#181818';
      this.add.text(nx,ny,labels[i],{fontFamily:'Share Tech Mono',fontSize:'7px',color:labelCol}).setOrigin(0.5);
    }
  }

  _drawStatus(){
    let p=STATE.parts;
    let sanCol=sanColor(STATE.sanity);
    // Background panel — mismo tamaño original
    this.add.rectangle(W/2, 96, W-20, 100, 0x080808, 0.92).setStrokeStyle(1, 0x220000, 0.6);

    // ── Nombre y clase — posición original ──────────────────────────
    this.add.text(18, 52, PLAYER_NAME, {fontFamily:'Share Tech Mono',fontSize:'15px',color:'#33cc33'}).setOrigin(0,0);
    this.add.text(18, 70, `[ ${PLAYER_CLASS.name} ]`, {fontFamily:'Share Tech Mono',fontSize:'10px',color:'#446622'}).setOrigin(0,0);

    // ── MENTE — posición original ────────────────────────────────────
    this.add.text(310, 52, 'MENTE', {fontFamily:'Share Tech Mono',fontSize:'9px',color:'#444'}).setOrigin(0.5,0);
    this.add.text(310, 64, `${STATE.sanity}`, {fontFamily:'Share Tech Mono',fontSize:'18px',color:sanCol,stroke:'#000',strokeThickness:1}).setOrigin(0.5,0);

    // ── ORO — posición original ──────────────────────────────────────
    this.add.text(450, 52, 'ORO', {fontFamily:'Share Tech Mono',fontSize:'9px',color:'#444'}).setOrigin(0.5,0);
    this.add.text(450, 64, `${STATE.gold}`, {fontFamily:'Share Tech Mono',fontSize:'18px',color:'#bbaa00'}).setOrigin(0.5,0);

    // ── Separadores verticales originales ────────────────────────────
    this.add.rectangle(270, 75, 1, 44, 0x220000, 0.5);
    this.add.rectangle(400, 75, 1, 44, 0x220000, 0.5);

    // ── Partes del cuerpo — posición original ───────────────────────
    let partLabels=['CAB','TORSO','B.IZQ','B.DER','P.IZQ','P.DER'];
    let partKeys=['head','torso','armL','armR','legL','legR'];
    let startX=530, colW=46;
    partKeys.forEach((k,i)=>{
      let pp=p[k];
      let val=pp.severed?'✗':`${pp.cur}`;
      let col=pp.severed?'#550000':this._partColor(pp.cur,pp.max);
      let xp=startX+i*colW;
      this.add.text(xp, 52, partLabels[i], {fontFamily:'Share Tech Mono',fontSize:'8px',color:'#445544'}).setOrigin(0.5,0);
      this.add.text(xp, 64, val, {fontFamily:'Share Tech Mono',fontSize:'16px',color:col,stroke:'#000',strokeThickness:1}).setOrigin(0.5,0);
      this.add.text(xp, 82, `/${pp.max}`, {fontFamily:'Share Tech Mono',fontSize:'8px',color:'#333'}).setOrigin(0.5,0);
    });

    // ── PREC · EVA · DMG — fila inferior bajo nombre/clase ──────────
    let pen=STATE.getLimbPenalties();
    let precPenMap=pen.accLimb+(pen.accSan||0);
    let evaPenMap=pen.eva;
    let precValMap=Math.max(0,100-precPenMap);
    let evaValMap=Math.max(0,100-evaPenMap);
    let dmgPenMap=STATE.getTotalDmgPenalty();
    let dmgMinMap=Math.max(1,8+STATE.buffs.damage-dmgPenMap);
    let dmgMaxMap=Math.max(1,18+STATE.buffs.damage-dmgPenMap);
    let precColMap=precValMap===100?'#22aa22':precValMap>=70?'#aaaa00':'#cc0000';
    let evaColMap=evaValMap===100?'#22aa22':evaValMap>=70?'#aaaa00':'#cc0000';
    let dmgColMap=dmgPenMap===0?'#22aa22':dmgPenMap<5?'#aaaa00':'#cc0000';
    this.add.text(18,  84, 'PREC', {fontFamily:'Share Tech Mono',fontSize:'9px',color:'#555'}).setOrigin(0,0);
    this.add.text(55,  84, `${precValMap}%`, {fontFamily:'Share Tech Mono',fontSize:'13px',color:precColMap,stroke:'#000',strokeThickness:1}).setOrigin(0,0);
    this.add.text(105, 84, 'EVA',  {fontFamily:'Share Tech Mono',fontSize:'9px',color:'#555'}).setOrigin(0,0);
    this.add.text(137, 84, `${evaValMap}%`,  {fontFamily:'Share Tech Mono',fontSize:'13px',color:evaColMap,stroke:'#000',strokeThickness:1}).setOrigin(0,0);
    this.add.text(185, 84, 'DMG',  {fontFamily:'Share Tech Mono',fontSize:'9px',color:'#555'}).setOrigin(0,0);
    this.add.text(215, 84, `${dmgMinMap}~${dmgMaxMap}`, {fontFamily:'Share Tech Mono',fontSize:'13px',color:dmgColMap,stroke:'#000',strokeThickness:1}).setOrigin(0,0);
  }
  _partColor(cur,max){
    if(!max) return '#444';
    let pct=cur/max;
    return pct>0.6?'#22aa22':pct>0.3?'#aaaa00':'#cc0000';
  }
  _drawLog(){
    // Large log panel at bottom like combat
    this.add.rectangle(W/2, 552, W-20, 88, 0x060606, 0.97).setStrokeStyle(1, 0x1a1a1a, 0.6);
    this.add.text(18, 511, '// TERMINAL:', {fontFamily:'Share Tech Mono',fontSize:'10px',color:'#333'});
    STATE.log.slice(0,5).forEach((l,i)=>
      this.add.text(18, 523+i*18, '> '+l.slice(0,98), {fontFamily:'Share Tech Mono',fontSize:'11px',color:i===0?'#446644':'#2a2a2a'}).setOrigin(0,0)
    );
  }
  _showChestScreen(){
    let ov=document.getElementById('chest-overlay');
    let content=document.getElementById('chest-content');
    let openBtn=document.getElementById('chest-open-btn');
    let restartBtn=document.getElementById('chest-restart-btn');
    let art=document.getElementById('chest-art');
    ov.style.display='flex';
    art.textContent='🪦';
    content.innerHTML='<p style="color:#555;font-size:13px">Has sobrevivido al descenso.<br>El cofre espera.</p>';
    openBtn.style.display='inline-block';
    restartBtn.style.display='none';
    openBtn.onclick=()=>{ SFX.chestOpen();
      let loot=rollLoot();
      openBtn.style.display='none';
      art.textContent=loot.icon;
      if(loot.empty){
        content.innerHTML=`
          <div class="loot-box">
            <div class="loot-item" style="color:#444">[ COFRE VACÍO ]</div>
            <div style="color:#333;font-size:12px;margin-top:8px">¿Valió la pena todo esto?</div>
            <div style="color:#222;font-size:11px;margin-top:4px">Siete niveles. Todas tus extremidades. Tu cordura.<br>Por nada.</div>
          </div>`;
      } else {
        content.innerHTML=`<div class="loot-box"><div class="loot-item" style="color:${loot.color}">★ ${loot.prize} ★</div></div>`;
      }
      restartBtn.style.display='inline-block';
      restartBtn.onclick=()=>{ ov.style.display='none'; STATE.reset(); location.reload(); };
    };
  }
}

//  SCENE: EVENT
// ═══════════════════════════════════════════════════════════════
class SceneEvent extends Phaser.Scene {
  constructor(){ super('SceneEvent'); }
  create(){
    this.cameras.main.fadeIn(400,0,0,0);
    this.add.rectangle(W/2,H/2,W,H,C.BLACK);
    for(let i=0;i<28;i++) this.add.rectangle(rnd(0,W),rnd(0,H),rnd(1,3),rnd(20,100),C.RED,rnd(1,8)/100);

    let ev=EVENTS[rnd(0,EVENTS.length-1)];
    this.resolved=false;
    this._ev=ev;

    let sanCol=sanColor(STATE.sanity);
    let sanWarn=STATE.sanity<50?' ⚠':'';
    this.add.text(W-15,10,`SAN ${STATE.sanity}${sanWarn}`,{fontFamily:'Share Tech Mono',fontSize:'12px',color:sanCol}).setOrigin(1,0);

    let p=STATE.parts;
    this.add.text(W-15,24,`CAB ${p.head.cur}/${p.head.max} TRS ${p.torso.cur}/${p.torso.max}  ORO ${STATE.gold}`,{fontFamily:'Share Tech Mono',fontSize:'10px',color:'#555'}).setOrigin(1,0);

    this.add.text(W/2,85,ev.title,{
      fontFamily:'Cinzel Decorative',fontSize:'34px',color:'#cc0000',
      stroke:'#000',strokeThickness:4,shadow:{color:'#ff0000',blur:18,fill:true},align:'center'
    }).setOrigin(0.5);
    this.add.text(W/2,175,ev.desc,{
      fontFamily:'Share Tech Mono',fontSize:'15px',color:'#666666',align:'center',wordWrap:{width:620}
    }).setOrigin(0.5);

    this.resultText=this.add.text(W/2,400,'',{
      fontFamily:'Share Tech Mono',fontSize:'14px',color:'#ffffff',align:'center',wordWrap:{width:680}
    }).setOrigin(0.5);

    // Choices: create all buttons first, then reposition based on actual widths
    let numChoices=ev.choices.length;
    let btnY=295;
    let padding=32; // space between buttons
    // Create all buttons at x=0 first so we can measure their real widths
    this.btns=ev.choices.map((ch,i)=>{
      let btn=this.add.text(0,btnY,`[ ${ch.label} ]`,{
        fontFamily:'Share Tech Mono',fontSize:'15px',color:'#cc0000',
        stroke:'#000',strokeThickness:2
      }).setOrigin(0.5).setInteractive({useHandCursor:true});
      btn.on('pointerover',()=>{btn.setColor('#ff4444');btn.setScale(1.04);});
      btn.on('pointerout', ()=>{btn.setColor('#cc0000');btn.setScale(1);});
      btn.on('pointerdown',()=>{
        if(this.resolved) return;
        SFX.eventChoice();
        if(ev.isDiceEvent && ch.label==='LANZAR EL DADO'){
          this._diceRoll();
        } else {
          this._resolve(ch.fn());
        }
      });
      return btn;
    });
    // Now measure total width and distribute evenly with consistent gaps
    let totalW=this.btns.reduce((s,b)=>s+b.width,0)+(numChoices-1)*padding;
    let curX=W/2 - totalW/2;
    this.btns.forEach(b=>{ curX+=b.width/2; b.setX(curX); curX+=b.width/2+padding; });

    this.nextBtn=this.add.text(W/2,510,'[ CONTINUAR ]',{fontFamily:'Share Tech Mono',fontSize:'18px',color:'#444444'}).setOrigin(0.5);
  }

  _diceRoll(){
    if(this.resolved) return;
    this.resolved=true;
    SFX.diceRoll();
    this.btns.forEach(b=>b.setActive(false).setVisible(false));

    // Animate dice
    let diceTxt=this.add.text(W/2,340,'?',{
      fontFamily:'Cinzel Decorative',fontSize:'80px',color:'#cc0000',
      stroke:'#000',strokeThickness:5,shadow:{color:'#ff0000',blur:30,fill:true}
    }).setOrigin(0.5);

    let count=0, maxRolls=20;
    let interval=setInterval(()=>{
      diceTxt.setText(String(rnd(1,6)));
      count++;
      if(count>=maxRolls){
        clearInterval(interval);
        let result=DICE_RESULTS[rnd(0,5)];
        diceTxt.setText(String(result.face)).setColor(result.color);
        this.cameras.main.flash(400,80,0,0);
        if(result.shake) this.cameras.main.shake(500,0.03);
        let extra=result.fn();
        this.time.delayedCall(600,()=>{
          SFX.diceResult(!result.bad);
          this._resolve({msg:`[ ${result.face} ] — ${result.msg}\n${extra}`, color:result.color, shake:result.shake});
        });
      }
    }, 80);
  }

  _resolve(result){ if(result && result.color){ if(['#22aa22','#00cc88','#44ff44','#ffcc00','#aaffaa'].includes(result.color)) SFX.eventGood(); else SFX.eventBad(); }
    if(!result) return;
    this.resolved=true;
    this.btns.forEach(b=>b.setActive(false).setVisible(false));
    this.resultText.setText(result.msg).setColor(result.color||'#ffffff');
    STATE.addLog(`[NV${STATE.level}] ${result.msg}`);
    if(result.shake) this.cameras.main.shake(500,0.025);

    if(STATE.sanity<=0){
      STATE.deathCause='insanity';
      this.time.delayedCall(2200,()=>{ this.cameras.main.fadeOut(600,0,0,0);
        this.time.delayedCall(600,()=>this.scene.start('SceneInsanity')); });
      return;
    }
    if(!STATE.isAlive()){
      // Allow coin flip before game over, same as combat
      if(!STATE.coinUsed){
        STATE.coinUsed=true;
        this.cameras.main.shake(600,0.04); this.cameras.main.flash(800,150,0,0);
        this.time.delayedCall(900,()=>{
          let dimmer=this.add.rectangle(W/2,H/2,W,H,0x000000,0).setDepth(30);
          this.tweens.add({targets:dimmer,alpha:0.82,duration:500});
          let title=this.add.text(W/2,200,'— LLEGAS A LAS PUERTAS —',{
            fontFamily:'Cinzel Decorative',fontSize:'22px',color:'#cc0000',
            stroke:'#000',strokeThickness:4
          }).setOrigin(0.5).setDepth(32).setAlpha(0);
          this.tweens.add({targets:title,alpha:1,duration:600,delay:300});
          let sub=this.add.text(W/2,260,'El evento te mató.\nTodavía tienes una moneda.',{
            fontFamily:'Share Tech Mono',fontSize:'14px',color:'#888888',align:'center'
          }).setOrigin(0.5).setDepth(32).setAlpha(0);
          this.tweens.add({targets:sub,alpha:1,duration:600,delay:500});
          let coinBtn=this.add.text(W/2,320,'[ ☽  LANZAR LA ÚLTIMA MONEDA  ☽ ]',{
            fontFamily:'Share Tech Mono',fontSize:'16px',color:'#ffaa00',
            backgroundColor:'#1a0800',padding:{x:14,y:9}
          }).setOrigin(0.5).setDepth(32).setAlpha(0).setInteractive({useHandCursor:true});
          this.tweens.add({targets:coinBtn,alpha:{from:0.3,to:1},duration:500,yoyo:true,repeat:-1,delay:700});
          coinBtn.on('pointerdown',()=>{
            this.tweens.killTweensOf(coinBtn);
            dimmer.destroy(); title.destroy(); sub.destroy(); coinBtn.destroy();
            if(Math.random()<0.5){
              let msgs=STATE.healDistribute(40);
              this.cameras.main.flash(700,0,80,0);
              this.resultText.setText(`CARA — La muerte te escupe. ${msgs.join(', ')}.`).setColor('#00cc66');
              this.nextBtn.setColor('#cc0000').setInteractive({useHandCursor:true});
              this.nextBtn.on('pointerdown',()=>{
                SFX.advance();
                STATE.level++;
                this.cameras.main.fadeOut(300,0,0,0);
                this.time.delayedCall(300,()=>this.scene.start('SceneMap'));
              });
            } else {
              STATE.parts.torso.cur=0;
              this.cameras.main.shake(900,0.06); this.cameras.main.flash(900,180,0,0);
              this.time.delayedCall(1500,()=>{ this.cameras.main.fadeOut(600,0,0,0);
                this.time.delayedCall(600,()=>this.scene.start('SceneGameOver')); });
            }
          });
        });
      } else {
        this.time.delayedCall(2000,()=>{ this.cameras.main.fadeOut(600,0,0,0);
          this.time.delayedCall(600,()=>this.scene.start('SceneGameOver')); });
      }
      return;
    }

    this.nextBtn.setColor('#cc0000').setInteractive({useHandCursor:true});
    this.nextBtn.on('pointerdown',()=>{
      SFX.advance();
      STATE.level++;
      this.cameras.main.fadeOut(300,0,0,0);
      this.time.delayedCall(300,()=>this.scene.start('SceneMap'));
    });
  }
}

// Enemy limb configs: each part has hp, maxHp, severChance (% per hit when at 0)
// effect when severed: 'dmg'=reduce att, 'acc'=reduce accuracy, 'eva'=reduce evasion
// requiredLimb: if this limb is severed, special attack is disabled
function mkELimbs(cfg){
  let def={
    head:   {exists:true,  hp:18, maxHp:18, severChance:20, effect:'kill',  effectVal:0},
    torso:  {exists:true,  hp:999,maxHp:999,severChance:0,  effect:null,    effectVal:0},
    armL:   {exists:true,  hp:14, maxHp:14, severChance:45, effect:'acc',   effectVal:-25},
    armR:   {exists:true,  hp:14, maxHp:14, severChance:45, effect:'acc',   effectVal:-25},
    legL:   {exists:true,  hp:16, maxHp:16, severChance:40, effect:'eva',   effectVal:-20},
    legR:   {exists:true,  hp:16, maxHp:16, severChance:40, effect:'eva',   effectVal:-20},
  };
  for(let k in cfg){ if(def[k]) Object.assign(def[k],cfg[k]); else def[k]=cfg[k]; }
  return def;
}

// ─── ASCII ART ───────────────────────────────────────────────────
function skeletonArt(l){
  let head=l.head.exists?(l.head.hp>0?'  [☠_☠]  ':'  [ x x]  '):'         ';
  let aL=  l.armL.exists?(l.armL.hp>0?'\\':'  '):'  ';
  let aR=  l.armR.exists?(l.armR.hp>0?'/':' '):'  ';
  let body='  |╬╬╬|  ';
  let lL=  l.legL.exists?(l.legL.hp>0?'/':'  '):'  ';
  let lR=  l.legR.exists?(l.legR.hp>0?'\\':' '):'  ';
  return head+'\n'+aL+'   '+aR+'\n'+body+'\n'+lL+'    '+lR;
}
function slimeArt(l){
  let core=l.nucleo&&l.nucleo.hp>0?'  ◉◉◉◉◉  ':'  ░░░░░  ';
  let mass=l.masa&&l.masa.hp>0?'●●●●●●●':'░░░░░░░';
  return '  ~~~~~\n'+ core+'\n '+mass+'\n  ~~~~~';
}
function fungoArt(l){
  let head=l.head.exists?(l.head.hp>0?'  (●●●●●)  ':'  (░░░░░)  '):'           ';
  let stalk=l.tallo&&l.tallo.hp>0?'    ║║║║    ':'    ░░░░    ';
  return head+'\n'+stalk+'\n'+stalk;
}
function humanArt(l){
  let head=l.head.exists?(l.head.hp>0?'  [◉_◉]  ':'  [ X X]  '):'         ';
  let aL=  l.armL.exists?(l.armL.hp>0?'─':' '):'  ';
  let aR=  l.armR.exists?(l.armR.hp>0?'─':' '):'  ';
  let body='  |▓▓▓|  ';
  let lL=  l.legL.exists?(l.legL.hp>0?'/':' '):'  ';
  let lR=  l.legR.exists?(l.legR.hp>0?'\\':' '):'  ';
  return head+'\n'+aL+'     '+aR+'\n'+body+'\n'+lL+'   '+lR;
}
function bossArt(l){
  let head=l.head.hp>0?'▓▓▓▓▓▓▓':'░░░░░░░';
  let aL=  l.armL.hp>0?'╠══╣':'     ';
  let aR=  l.armR.hp>0?'╠══╣':'     ';
  return  '  /'+head+'\\\n'+aL+'[█████]'+aR+'\n  |█████|\n  ▓▓▓▓▓▓▓';
}

function pickEnemy(level){
  if(level<=2) return ENEMIES_T1[rnd(0,ENEMIES_T1.length-1)];
  if(level===3) return chance(60)?ENEMIES_T1[rnd(0,ENEMIES_T1.length-1)]:ENEMIES_T2[rnd(0,ENEMIES_T2.length-1)];
  if(level===4) return chance(50)?ENEMIES_T2[rnd(0,ENEMIES_T2.length-1)]:ENEMIES_T3[rnd(0,ENEMIES_T3.length-1)];
  return ENEMIES_T3[rnd(0,ENEMIES_T3.length-1)];
}

//  SCENE: BATTLE
// ═══════════════════════════════════════════════════════════════
class SceneBattle extends Phaser.Scene {
  constructor(){ super('SceneBattle'); }

  init(data){
    this.isBoss=(data&&data.isBoss===true)?true:false;
    let tmpl=this.isBoss?BOSS:pickEnemy(STATE.level);
    this.enemy=JSON.parse(JSON.stringify(tmpl));
    this.enemy.artFn=tmpl.artFn;
    this.enemy.specialActs=tmpl.specialActs||[];
    // Set torsoHp on enemy object
    this.enemy.hp=this.enemy.torsoHp;
    this.playerTurn=true; this.battleOver=false;
    this.coinUsed=STATE.coinUsed||false;
    this.nextCritical=false;
    this.defending=false; this.enemyStunned=false;
    this.pendingSpecial=null;
    this.log=[];
    this._accDebuff=0;
  }

  create(){
    this.cameras.main.fadeIn(400,0,0,0);
    this.add.rectangle(W/2,H/2,W,H,C.BLACK);
    for(let i=0;i<15;i++) this.add.rectangle(rnd(0,W),rnd(0,H),1,rnd(50,200),C.RED,rnd(2,10)/100);

    this.add.text(W/2,18,this.isBoss?'⚠  JEFE FINAL  ⚠':'— COMBATE —',{
      fontFamily:'Share Tech Mono',fontSize:this.isBoss?'20px':'14px',
      color:this.isBoss?'#ff2222':'#666666',letterSpacing:4
    }).setOrigin(0.5);

    this._buildEnemySide();
    this._buildPlayerSide();
    this._buildLog();
    this._buildActions();

    STATE.addLog(`[NV${STATE.level}] BATALLA vs ${this.enemy.name}`);
    this._addLog(`${this.enemy.name} aparece. ${this.enemy.desc}`);
    if(this.isBoss){ this.cameras.main.flash(800,100,0,0); this.cameras.main.shake(600,0.022); SFX.bossEncounter(); }

    let sanPen=STATE.getSanityPenalties();
    if(sanPen.acc>0||sanPen.dmg>0) this._addLog(`⚠ LOCURA: -${sanPen.acc}% Precisión, -${sanPen.dmg} Daño`);
  }

  // ── Enemy side UI ──────────────────────────────────────────────
  _buildEnemySide(){
    let ex=210, ey=248;
    // Name above box — well clear of box top (ey-77=171)
    this.add.text(ex,ey-112,this.enemy.name,{fontFamily:'Share Tech Mono',fontSize:'12px',color:'#cc0000',align:'center',wordWrap:{width:175}}).setOrigin(0.5);
    const tierColor = this.enemy.tier?.includes('III')?'#cc6600':this.enemy.tier?.includes('II')?'#aaaa00':this.enemy.tier?.includes('JEFE')?'#ff2222':'#22aa22';
    this.add.text(ex,ey-96,this.enemy.tier||'',{fontFamily:'Share Tech Mono',fontSize:'9px',color:tierColor,align:'center'}).setOrigin(0.5);
    this.enemyDebuffTxt=this.add.text(ex,ey-84,'',{fontFamily:'Share Tech Mono',fontSize:'9px',color:'#aa2200',align:'center'}).setOrigin(0.5);

    this.enemyBox=this.add.rectangle(ex,ey,185,155,C.GREY,0.8).setStrokeStyle(2,C.RED,0.7);
    this.enemyBodyTxt=this.add.text(ex,ey,this._enemyBodyArt(),{fontFamily:'Share Tech Mono',fontSize:'12px',color:'#cccccc',align:'center',lineSpacing:3}).setOrigin(0.5);

    // Torso HP — BELOW the box
    let boxBottom=ey+78;
    this.enemyHpTxt=this.add.text(ex,boxBottom+16,`TORSO: ${this.enemy.hp}/${this.enemy.maxTorsoHp||this.enemy.torsoHp}`,{fontFamily:'Share Tech Mono',fontSize:'16px',color:'#cc0000',stroke:'#000',strokeThickness:2}).setOrigin(0.5);

    // Separator line
    this.add.rectangle(ex,boxBottom+30,170,1,0x330000,0.7);

    // Limb HP numbers below — centered around ex
    this.enemyLimbNumTxts={};
    let ld=this.enemy.limbData;

    if(this.enemy.slimeParts){
      let sp=this.enemy.slimeParts;
      let ly=boxBottom+42;
      this.add.text(ex-35,ly,'NUC',{fontFamily:'Share Tech Mono',fontSize:'10px',color:'#664400'}).setOrigin(0.5);
      this.enemyLimbNumTxts['nucleo']=this.add.text(ex-35,ly+18,`${sp.nucleo.hp}`,{fontFamily:'Share Tech Mono',fontSize:'16px',color:'#cc4400'}).setOrigin(0.5);
      this.add.text(ex+35,ly,'MAS',{fontFamily:'Share Tech Mono',fontSize:'10px',color:'#555'}).setOrigin(0.5);
      this.enemyLimbNumTxts['masa']=this.add.text(ex+35,ly+18,`${sp.masa.hp}`,{fontFamily:'Share Tech Mono',fontSize:'16px',color:'#886600'}).setOrigin(0.5);
      return;
    }

    // Build list of existing limbs for centered layout
    let limbDefs=[];
    if(ld.head&&ld.head.exists) limbDefs.push({k:'head',label:'CAB',l:ld.head,col:this._limbNumColor(ld.head.hp,ld.head.maxHp)});
    ['armL','armR','legL','legR','tallo'].forEach(k=>{
      let lb={armL:'B.IZ',armR:'B.DE',legL:'P.IZ',legR:'P.DE',tallo:'TLL'};
      let l=ld[k]; if(!l||!l.exists) return;
      limbDefs.push({k,label:lb[k]||k.slice(0,3),l,col:this._limbNumColor(l.hp,l.maxHp)});
    });

    let n=limbDefs.length;
    let colW=32, totalW=(n-1)*colW;
    let startX=ex-totalW/2;
    let ly=boxBottom+42;
    limbDefs.forEach(({k,label,l,col},i)=>{
      let lx=startX+i*colW;
      this.add.text(lx,ly,label,{fontFamily:'Share Tech Mono',fontSize:'9px',color:'#555'}).setOrigin(0.5);
      let t=this.add.text(lx,ly+16,`${l.hp}`,{fontFamily:'Share Tech Mono',fontSize:'15px',color:col}).setOrigin(0.5);
      this.enemyLimbNumTxts[k]=t;
    });
  }

  // ── Player side UI ─────────────────────────────────────────────
  _buildPlayerSide(){
    let px=590, py=248;
    // Name and class ABOVE the box — box top is at py-77=171, so names at ~148 and 160
    this.add.text(px,py-112,PLAYER_NAME,{fontFamily:'Share Tech Mono',fontSize:'12px',color:'#33aa33'}).setOrigin(0.5);
    this.add.text(px,py-98,`[ ${PLAYER_CLASS.name} ]`,{fontFamily:'Share Tech Mono',fontSize:'9px',color:'#446622'}).setOrigin(0.5);

    this.playerBox=this.add.rectangle(px,py,185,155,C.GREY,0.8).setStrokeStyle(2,0x334433,0.7);
    this.playerBodyTxt=this.add.text(px,py,this._playerBodyArt(),{fontFamily:'Share Tech Mono',fontSize:'13px',color:'#aaccaa',align:'center',lineSpacing:4}).setOrigin(0.5);

    // Torso HP — BELOW the box
    let boxBottom=py+78;
    let p=STATE.parts;
    let torsoCol=this._limbNumColor(p.torso.cur,p.torso.max);
    this.playerTorsoTxt=this.add.text(px,boxBottom+16,`TORSO: ${p.torso.cur}/${p.torso.max}`,{fontFamily:'Share Tech Mono',fontSize:'16px',color:torsoCol,stroke:'#000',strokeThickness:2}).setOrigin(0.5);

    // Separator
    this.add.rectangle(px,boxBottom+30,170,1,0x224422,0.7);

    // Limbs — centered around px
    this.playerLimbNumTxts={};
    let partKeys=['head','armL','armR','legL','legR'];
    let labels=['CAB','B.IZ','B.DE','P.IZ','P.DE'];
    let n=partKeys.length, colW=35, totalW=(n-1)*colW;
    let startX=px-totalW/2;
    let ly=boxBottom+42;
    partKeys.forEach((k,i)=>{
      let pp=STATE.parts[k];
      let col=pp.severed?'#550000':this._limbNumColor(pp.cur,pp.max);
      let val=pp.severed?'✗':pp.cur;
      let lx=startX+i*colW;
      this.add.text(lx,ly,labels[i],{fontFamily:'Share Tech Mono',fontSize:'9px',color:'#446633'}).setOrigin(0.5);
      let t=this.add.text(lx,ly+16,`${val}`,{fontFamily:'Share Tech Mono',fontSize:'15px',color:col}).setOrigin(0.5);
      this.playerLimbNumTxts[k]=t;
    });
    this.playerLimbNumTxts['torso']=this.playerTorsoTxt;

    // SAN — bigger, more separated
    this.playerSanTxt=this.add.text(px,boxBottom+76,`CORDURA: ${STATE.sanity}`,{fontFamily:'Share Tech Mono',fontSize:'13px',color:sanColor(STATE.sanity),stroke:'#000',strokeThickness:1}).setOrigin(0.5);
    // DMG — mismo formato
    let dmgPenInit=STATE.getTotalDmgPenalty();
    let dmgMinInit=Math.max(1,8+STATE.buffs.damage-dmgPenInit);
    let dmgMaxInit=Math.max(1,18+STATE.buffs.damage-dmgPenInit);
    let dmgColInit=dmgPenInit===0?'#226622':dmgPenInit<5?'#aaaa00':'#cc0000';
    this.playerDmgTxt=this.add.text(px,boxBottom+94,`DMG: ${dmgMinInit}~${dmgMaxInit}`,{fontFamily:'Share Tech Mono',fontSize:'13px',color:dmgColInit,stroke:'#000',strokeThickness:1}).setOrigin(0.5);

    // Mostrar siempre Prec y Eva — colores dinámicos según penalización
    let pen=STATE.getLimbPenalties();
    let precPen=pen.accLimb+(pen.accSan||0); // _accDebuff siempre 0 al inicio
    let evaPen=pen.eva;
    let precVal=Math.max(0,100-precPen);
    let evaVal=Math.max(0,100-evaPen);
    let precStr=`PREC ${precVal}%`;
    let evaStr=`EVA ${evaVal}%`;
    let precCol=precVal===100?'#226622':precVal>=70?'#aaaa00':'#cc0000';
    let evaCol=evaVal===100?'#226622':evaVal>=70?'#aaaa00':'#cc0000';
    this.playerPrecTxt=this.add.text(px-48,py-84,precStr,{fontFamily:'Share Tech Mono',fontSize:'9px',color:precCol}).setOrigin(0.5);
    this.playerEvaTxt =this.add.text(px+48,py-84,evaStr, {fontFamily:'Share Tech Mono',fontSize:'9px',color:evaCol}).setOrigin(0.5);
    // Calcular texto inicial de debuffs (mente/veneno) al construir
    let initPp=[];
    let initSanPen=STATE.getSanityPenalties();
    if(initSanPen.acc>0||initSanPen.dmg>0){
      let parts=[];
      if(initSanPen.acc>0) parts.push(`-${initSanPen.acc}% Prec`);
      if(initSanPen.dmg>0) parts.push(`-${initSanPen.dmg} Dmg`);
      initPp.push(`Mente baja: ${parts.join(', ')}`);
    }
    this.playerDebuffTxt=this.add.text(px,boxBottom+112,initPp.join('  '),{fontFamily:'Share Tech Mono',fontSize:'8px',color:'#aa2200'}).setOrigin(0.5);
  }

  _buildLog(){
    this.add.rectangle(W/2,552,W-20,88,C.DARK,0.95).setStrokeStyle(1,C.ASH,0.4);
    this.add.text(20,511,'// TERMINAL:',{fontFamily:'Share Tech Mono',fontSize:'10px',color:'#333'});
    this.logTexts=[];
    for(let i=0;i<4;i++){
      this.logTexts.push(this.add.text(22,523+i*20,'',{fontFamily:'Share Tech Mono',fontSize:'11px',color:'#446644',wordWrap:{width:756}}));
    }
  }

  _buildActions(){
    this.add.text(15,72,'APUNTAR:',{fontFamily:'Share Tech Mono',fontSize:'11px',color:'#444'}).setOrigin(0,0.5);
    let validTargets=this._getValidTargets();
    this.selectedTarget=validTargets.includes('torso')?'torso':validTargets[0];
    this.targetBtns={}; this.targetPctTxts={};

    let startX=108, spacing=88;
    const targetLabels={torso:'Torso',head:'Cabeza',armL:'B.Izq',armR:'B.Der',legL:'P.Izq',legR:'P.Der',nucleo:'Núcleo',masa:'Masa',tallo:'Tallo'};

      let hc=this._getHitChance(lmb);

      let tx=startX+i*spacing;

        fontFamily:'Share Tech Mono',fontSize:'11px',color:'#666666',
        backgroundColor:'#111',padding:{x:4,y:2}
      }).setOrigin(0.5).setInteractive({useHandCursor:true});
      let pctCol=hc>=60?'#448844':hc>=40?'#888833':'#883333';
