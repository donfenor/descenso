      this.targetBtns[lmb]=btn; this.targetPctTxts[lmb]=pct;
    });
    this._selectTarget(this.selectedTarget);

    let btnAtk=this.add.text(130,463,'[ ATACAR ]',{fontFamily:'Share Tech Mono',fontSize:'18px',color:'#cc0000',stroke:'#000',strokeThickness:2}).setOrigin(0.5).setInteractive({useHandCursor:true});
    btnAtk.on('pointerover',()=>{btnAtk.setScale(1.06);btnAtk.setColor('#ff4444');});
    btnAtk.on('pointerout', ()=>{btnAtk.setScale(1);btnAtk.setColor('#cc0000');});
    btnAtk.on('pointerdown',()=>{if(this.playerTurn&&!this.battleOver&&!this.pendingSpecial)this._playerAttack();});
    this.atkBtn=btnAtk;

    let btnFlee=this.add.text(320,463,'[ HUIR ]',{fontFamily:'Share Tech Mono',fontSize:'18px',color:'#884400',stroke:'#000',strokeThickness:2}).setOrigin(0.5).setInteractive({useHandCursor:true});
    btnFlee.on('pointerover',()=>{btnFlee.setScale(1.06);btnFlee.setColor('#cc6600');});
    btnFlee.on('pointerout', ()=>{btnFlee.setScale(1);btnFlee.setColor('#884400');});
    btnFlee.on('pointerdown',()=>{if(this.playerTurn&&!this.battleOver&&!this.pendingSpecial)this._flee();});
    this.fleeBtn=btnFlee;

    this.defendBtn=this.add.text(W/2,463,'[ DEFENDERSE ]',{
      fontFamily:'Share Tech Mono',fontSize:'17px',color:'#446688',stroke:'#000',strokeThickness:2,
      backgroundColor:'#001122',padding:{x:8,y:4}
    }).setOrigin(0.5).setInteractive({useHandCursor:true}).setVisible(false);
    this.defendBtn.on('pointerover',()=>{this.defendBtn.setScale(1.06);this.defendBtn.setColor('#88aaff');});
    this.defendBtn.on('pointerout', ()=>{this.defendBtn.setScale(1);this.defendBtn.setColor('#446688');});
    this.defendBtn.on('pointerdown',()=>{if(this.pendingSpecial)this._playerDefend();});

    this.telegraphTxt=this.add.text(W/2,487,'',{
      fontFamily:'Share Tech Mono',fontSize:'12px',color:'#ff8800',
      align:'center',wordWrap:{width:700},stroke:'#000',strokeThickness:2
    }).setOrigin(0.5).setVisible(false);
  }

  _getValidTargets(){
    if(this.enemy.slimeParts){
      return ['masa','nucleo'];
    }
    let targets=['torso'];
    let ld=this.enemy.limbData;
    // Head first
    if(ld.head&&ld.head.exists&&ld.head.hp>0) targets.push('head');
    // Tallo for fungo
    if(ld.tallo&&ld.tallo.exists&&ld.tallo.hp>0) targets.push('tallo');
    // Arms
    if(ld.armL&&ld.armL.exists&&ld.armL.hp>0) targets.push('armL');
    if(ld.armR&&ld.armR.exists&&ld.armR.hp>0) targets.push('armR');
    // Legs
    if(ld.legL&&ld.legL.exists&&ld.legL.hp>0) targets.push('legL');
    if(ld.legR&&ld.legR.exists&&ld.legR.hp>0) targets.push('legR');
    return targets;
  }

  // ── Graphics helpers ───────────────────────────────────────────
  _limbNumColor(cur,max){
    if(!max) return '#444';
    let pct=cur/max;
    return pct>0.6?'#22aa22':pct>0.3?'#aaaa00':'#cc0000';
  }
  _selectTarget(lmb){
    this.selectedTarget=lmb;
    Object.keys(this.targetBtns).forEach(k=>this.targetBtns[k].setColor(k===lmb?'#ff4444':'#666666'));
    this._refreshTargetPcts();
  }
  _refreshTargetPcts(){
    if(!this.targetPctTxts) return;
    Object.keys(this.targetPctTxts).forEach(lmb=>{
      let hc=this._getHitChance(lmb);
      let col=this.selectedTarget===lmb?'#ff6666':hc>=60?'#448844':hc>=40?'#888833':'#883333';
      this.targetPctTxts[lmb].setText(`${hc}%`).setColor(col);
    });
  }
  _rebuildTargetBtns(){
    if(!this.targetBtns) return;
    for(let k in this.targetBtns){
      let btn=this.targetBtns[k]; let pct=this.targetPctTxts[k];
      let severed=false;
      if(k==='torso') severed=false;
      else if(k==='nucleo'||k==='masa'){
        severed=this.enemy.slimeParts?this.enemy.slimeParts[k].hp<=0:false;
      } else {
        let ld=this.enemy.limbData[k];
        severed=!ld||!ld.exists||ld.hp<=0;
      }
      if(severed){
        btn.setColor('#333333').disableInteractive();
        if(pct) pct.setText('✗').setColor('#333333');
        if(this.selectedTarget===k) this._selectTarget('torso');
      }
    }
  }

  _enemyBodyArt(){
    if(this.enemy.slimeParts){
      return slimeArt({nucleo:this.enemy.slimeParts.nucleo, masa:this.enemy.slimeParts.masa});
    }
    return this.enemy.artFn(this.enemy.limbData);
  }
  _playerBodyArt(){
    let p=STATE.parts;
    let h=p.head.severed?' [X X] ':p.head.cur>0?' [●_●] ':' [X X] ';
    let aL=p.armL.severed?' ':p.armL.cur>0?'─':' ';
    let aR=p.armR.severed?' ':p.armR.cur>0?'─':' ';
    let tr=p.torso.cur>0?' |███| ':' |░░░| ';
    let lL=p.legL.severed?' ':p.legL.cur>0?'/':' ';
    let lR=p.legR.severed?' ':p.legR.cur>0?'\\':' ';
    return h+'\n'+aL+'   '+aR+'\n'+tr+'\n'+lL+'  '+lR;
  }
  _enemyLimbStr(){
    if(this.enemy.slimeParts){
      let sp=this.enemy.slimeParts;
      return `Núcleo:${sp.nucleo.hp}/${sp.nucleo.maxHp} Masa:${sp.masa.hp}/${sp.masa.maxHp}`;
    }
    let parts=[];
    let ld=this.enemy.limbData;
    if(ld.head&&ld.head.exists) parts.push(`CAB:${ld.head.hp>0?ld.head.hp:'✗'}`);
    if(ld.tallo&&ld.tallo.exists) parts.push(`TLL:${ld.tallo.hp>0?ld.tallo.hp:'✗'}`);
    ['armL','armR','legL','legR'].forEach(k=>{
      let l=ld[k]; if(!l||!l.exists) return;
      parts.push(`${partName(k).slice(0,3)}:${l.hp>0?l.hp:'✗'}`);
    });
    return parts.join(' ');
  }
  _addLog(msg){
    this.log.unshift(msg);
    this.logTexts.forEach((t,i)=>t.setText(this.log[i]?'> '+this.log[i]:''));
  }

  _refreshUI(){
    // Enemy torso HP
    let maxT=this.enemy.maxTorsoHp||this.enemy.torsoHp;
    let eHpCol=this.enemy.hp>maxT*0.6?'#cc0000':this.enemy.hp>maxT*0.3?'#cc6600':'#ff2222';
    this.enemyHpTxt.setText(`TORSO: ${this.enemy.hp}/${maxT}`).setColor(eHpCol);
    this.enemyBodyTxt.setText(this._enemyBodyArt());
    // No enemyLimbTxt — removed duplicate

    // Enemy limb HP numbers
    for(let k in this.enemyLimbNumTxts){
      let t=this.enemyLimbNumTxts[k];
      if(this.enemy.slimeParts){
        let sp=this.enemy.slimeParts;
        if(k==='nucleo') t.setText(`${sp.nucleo.hp}`).setColor(this._limbNumColor(sp.nucleo.hp,sp.nucleo.maxHp));
        if(k==='masa')   t.setText(`${sp.masa.hp}`).setColor(this._limbNumColor(sp.masa.hp,sp.masa.maxHp));
      } else {
        let ld=this.enemy.limbData[k];
        if(ld&&ld.exists){
          if(ld.hp<=0) t.setText('✗').setColor('#550000');
          else t.setText(`${ld.hp}`).setColor(this._limbNumColor(ld.hp,ld.maxHp));
        }
      }
    }

    // Player parts — torso gets special formatted text, others simple numbers
    let pt=STATE.parts.torso;
    let torsoCol=this._limbNumColor(pt.cur,pt.max);
    this.playerTorsoTxt.setText(`TORSO: ${pt.cur}/${pt.max}`).setColor(torsoCol);

    for(let k in this.playerLimbNumTxts){
      if(k==='torso') continue; // handled above
      let t=this.playerLimbNumTxts[k];
      let p=STATE.parts[k];
      if(p.severed) t.setText('✗').setColor('#550000');
      else t.setText(`${p.cur}`).setColor(this._limbNumColor(p.cur,p.max));
    }
    this.playerBodyTxt.setText(this._playerBodyArt());
    this.playerSanTxt.setText(`CORDURA: ${STATE.sanity}`).setColor(sanColor(STATE.sanity));
    // Actualizar DMG
    let dmgPenR=STATE.getTotalDmgPenalty();
    let dmgMinR=Math.max(1,8+STATE.buffs.damage-dmgPenR);
    let dmgMaxR=Math.max(1,18+STATE.buffs.damage-dmgPenR);
    let dmgColR=dmgPenR===0?'#226622':dmgPenR<5?'#aaaa00':'#cc0000';
    if(this.playerDmgTxt) this.playerDmgTxt.setText(`DMG: ${dmgMinR}~${dmgMaxR}`).setColor(dmgColR);

    // Refresh Prec y Eva siempre visibles con color dinámico
    let pen2=STATE.getLimbPenalties();
    let accDebuff2=this._accDebuff||0;
    let precPen2=pen2.accLimb+(pen2.accSan||0)+accDebuff2;
    let evaPen2=pen2.eva;
    let precVal2=Math.max(0,100-precPen2);
    let evaVal2=Math.max(0,100-evaPen2);
    let precStr2=`PREC ${precVal2}%`;
    let evaStr2=`EVA ${evaVal2}%`;
    let precCol2=precVal2===100?'#226622':precVal2>=70?'#aaaa00':'#cc0000';
    let evaCol2=evaVal2===100?'#226622':evaVal2>=70?'#aaaa00':'#cc0000';
    if(this.playerPrecTxt) this.playerPrecTxt.setText(precStr2).setColor(precCol2);
    if(this.playerEvaTxt)  this.playerEvaTxt.setText(evaStr2).setColor(evaCol2);
    // Línea de detalle: explica causas de los debuffs activos
    let pp2=[];
    if(pen2.accSan>0 || STATE.getTotalDmgPenalty()>0){
      let dmgPen2=STATE.getTotalDmgPenalty();
      let parts=[];
      if(pen2.accSan>0) parts.push(`-${pen2.accSan}% Prec`);
      if(dmgPen2>0)     parts.push(`-${dmgPen2} Dmg`);
      pp2.push(`Mente baja: ${parts.join(', ')}`);
    }
    if(accDebuff2>0) pp2.push(`Veneno: -${accDebuff2}% Prec`);
    this.playerDebuffTxt.setText(pp2.join('  ')).setColor('#aa2200');

    // Refresh enemy debuff display (from severed limbs)
    let ep=[];
    let eld=this.enemy.limbData;
    if(eld){
      let armLGone=eld.armL&&eld.armL.exists&&eld.armL.hp<=0;
      let armRGone=eld.armR&&eld.armR.exists&&eld.armR.hp<=0;
      let legLGone=eld.legL&&eld.legL.exists&&eld.legL.hp<=0;
      let legRGone=eld.legR&&eld.legR.exists&&eld.legR.hp<=0;
      if(armLGone||armRGone) ep.push(`-${armLGone&&armRGone?'50':'25'}%Prec`);
      if(legLGone||legRGone) ep.push(`-${legLGone&&legRGone?'40':'20'}%Eva`);
    }
    if(this.enemyDebuffTxt) this.enemyDebuffTxt.setText(ep.join('  ')).setColor(ep.length?'#aa2200':'#333333');

    this._refreshTargetPcts();
    this._rebuildTargetBtns();
  }

  // ── Hit chances ────────────────────────────────────────────────
  _getHitChance(target){
    // Base chances per target type
    let base;
    if(target==='torso') base=70;
    else if(target==='head') base=25;
    else if(target==='nucleo'){
      // Si la masa sigue viva el núcleo tiene evasión perfecta
      base=this.enemy.slimeParts&&this.enemy.slimeParts.masa.hp>0 ? 0 : 45;
    }
    else if(target==='masa') base=62;
    else if(target==='tallo') base=55;
    else base=52; // arms/legs

    let pen=STATE.getLimbPenalties().acc;
    pen+=this._accDebuff||0;
    let ch=base-pen;
    // Enemy leg debuff makes it easier to hit them
    ch+=(this.enemy.evaDebuff||0);
    if(PLAYER_CLASS.id==='asesino') ch+=12;
    if(PLAYER_CLASS.id==='hombre_rata') ch+=6;
    return Math.max(5,Math.round(ch));
  }

  // ── Player attack ──────────────────────────────────────────────
  _playerAttack(){
    if(!this.playerTurn||this.battleOver) return;
    this.playerTurn=false;

    let target=this.selectedTarget;

    // Validate target still exists
    if(this.enemy.slimeParts){
      if(!['nucleo','masa'].includes(target)){ this._addLog('Golpeas la masa.'); target='masa'; }
      let sp=this.enemy.slimeParts;
      if(target==='nucleo'&&sp.nucleo.hp<=0){ target='masa'; }
      if(target==='masa'&&sp.masa.hp<=0){ target='nucleo'; }
    } else {
      if(target!=='torso'){
        let ld=this.enemy.limbData[target];
        if(!ld||!ld.exists||ld.hp<=0){
          this._addLog(`${partName(target)} ya destruido. Golpeas el torso.`);
          target='torso';
        }
      }
    }

    if(!chance(this._getHitChance(target))){
      this._addLog(`FALLO — ${partName(target)} esquivado.`);
      SFX.miss();
      this.time.delayedCall(600,()=>this._enemyTurn()); return;
    }

    let sanPen=STATE.getSanityPenalties();
    let baseDmg=Math.max(1, rnd(8,18)+STATE.buffs.damage-sanPen.dmg);
    let isCrit=this.nextCritical;
    if(!isCrit && PLAYER_CLASS.id==='asesino' && chance(22)) isCrit=true;
    if(!isCrit && PLAYER_CLASS.id==='hombre_rata' && chance(15)) isCrit=true;
    this.nextCritical=false;

    // Damage multipliers
    let mult={torso:1.0,head:1.8,tallo:0.9,armL:0.65,armR:0.65,legL:0.6,legR:0.6,nucleo:1.9,masa:0.85}[target]||1;
    let def=this.enemy.def||0;
    let dmg=Math.max(1,Math.round(baseDmg*mult*(isCrit?2:1))-Math.round(def*0.3));

    let extraMsg='';
    let flash=()=>{
      let fl=this.add.rectangle(200,210,180,205,C.BLOOD,0).setDepth(20);
      this.tweens.add({targets:fl,alpha:{from:0.6,to:0},duration:200});
      this.cameras.main.shake(isCrit?400:200,isCrit?0.03:0.015);
      this.cameras.main.flash(isCrit?300:150,80,0,0);
      if(isCrit) SFX.critHit(); else SFX.playerHit();
    };

    // ── SLIME ──
    if(this.enemy.slimeParts){
      let sp=this.enemy.slimeParts;
      if(target==='masa'){
        sp.masa.hp=Math.max(0,sp.masa.hp-dmg);
        extraMsg=` [Masa: ${sp.masa.hp}/${sp.masa.maxHp}]`;
        if(sp.masa.hp<=0){
          extraMsg=' ¡MASA DESTRUIDA! El Núcleo queda expuesto.';
          this._addLog(`${isCrit?'★CRÍTICO★ ':''}Golpeas Masa por ${dmg}.${extraMsg}`);
          flash(); this._refreshUI();
          this.time.delayedCall(700,()=>this._enemyTurn()); return;
        }
      } else {
        // nucleo — solo accesible si masa destruida
        sp.nucleo.hp=Math.max(0,sp.nucleo.hp-dmg);
        extraMsg=` [Núcleo: ${sp.nucleo.hp}/${sp.nucleo.maxHp}]`;
        if(sp.nucleo.hp<=0){
          sp.nucleo.hp=0; this.enemy.hp=0;
          this._addLog(`${isCrit?'★CRÍTICO★ ':''}¡NÚCLEO REVENTADO! ${dmg} DMG. ¡EL SLIME SE DISUELVE!`);
          flash(); this._refreshUI(); this._winBattle(); return;
        }
      }
      this._addLog(`${isCrit?'★CRÍTICO★ ':''}Golpeas ${partName(target)} por ${dmg}.${extraMsg}`);
      flash(); this._refreshUI();
      this.time.delayedCall(700,()=>this._enemyTurn()); return;
    }

    // ── HEAD ──
    if(target==='head'){
      let ld=this.enemy.limbData.head;
      ld.hp=Math.max(0,ld.hp-dmg);
      extraMsg=` [Cabeza: ${ld.hp}/${ld.maxHp}]`;
      if(ld.hp<=0){
        // Instant kill
        this._addLog(`${isCrit?'★CRÍTICO★ ':''}Golpeas Cabeza por ${dmg}.${extraMsg} ¡CRÁNEO DESTRUIDO!`);
        this.enemy.hp=0;
        this.cameras.main.shake(600,0.05); this.cameras.main.flash(400,150,20,0);
        let fl=this.add.rectangle(200,210,180,205,C.BLOOD,0).setDepth(20);
        this.tweens.add({targets:fl,alpha:{from:0.8,to:0},duration:300});
        this._refreshUI(); this._winBattle(); return;
      } else if(chance(20)&&ld.hp<=ld.maxHp*0.4){
        // Low HP head: chance of instant sever
        this._addLog(`${isCrit?'★CRÍTICO★ ':''}Golpeas Cabeza por ${dmg}.${extraMsg} ¡CABEZA VOLADA!`);
        this.enemy.hp=0;
        flash(); this._refreshUI(); this._winBattle(); return;
      }
    }
    // ── TORSO ──
    else if(target==='torso'){
      this.enemy.hp=Math.max(0,this.enemy.hp-dmg);
      this._addLog(`${isCrit?'★CRÍTICO★ ':''}Golpeas Torso por ${dmg}. [${this.enemy.hp}/${this.enemy.maxTorsoHp||this.enemy.torsoHp}]`);
      flash(); this._refreshUI();
      if(this.enemy.hp<=0){ this._winBattle(); return; }
      this.time.delayedCall(700,()=>this._enemyTurn()); return;
    }
    // ── LIMB (tallo, armL, armR, legL, legR) ──
    else {
      let ld=this.enemy.limbData[target];
      if(ld){
        ld.hp=Math.max(0,ld.hp-dmg);
        extraMsg=` [${partName(target)}: ${ld.hp}/${ld.maxHp}]`;
        if(ld.hp<=0 && chance(ld.severChance)){
          ld.hp=0;
          extraMsg=' ¡AMPUTADO!';
          // Apply effect
          if(ld.effect==='dmg') this.enemy.att=Math.max(2,Math.round(this.enemy.att*(1+ld.effectVal)));
          if(ld.effect==='acc') this.enemy.acc=Math.max(10,this.enemy.acc+ld.effectVal);
          if(ld.effect==='eva'){ this.enemy.evaDebuff=(this.enemy.evaDebuff||0)+Math.abs(ld.effectVal); }
          // Disable specials that require this limb
          this.enemy.specialActs=this.enemy.specialActs.filter(sa=>{
            if(sa.requiredLimb===target){
              this._addLog(`¡${this.enemy.name} ya no puede usar ${sa.name}!`);
              return false;
            }
            return true;
          });
        } else if(ld.hp<=0){
          extraMsg+=` [dañado, no amputado]`;
        }
      }
    }

    let msg=`${isCrit?'★CRÍTICO★ ':''}Golpeas ${partName(target)} por ${dmg}.${extraMsg}`;
    this._addLog(msg); STATE.addLog(msg);
    flash(); this._refreshUI();

    if(this.enemy.hp<=0){ this._winBattle(); return; }
    this.time.delayedCall(700,()=>this._enemyTurn());
  }

  _playerDefend(){
    if(!this.pendingSpecial||this.battleOver) return;
    let special=this.pendingSpecial;
    this.pendingSpecial=null;
    this.defendBtn.setVisible(false);
    this.telegraphTxt.setVisible(false);
    this.atkBtn.setVisible(true);
    this.fleeBtn.setVisible(true);
    this.playerTurn=false;

    if(chance(special.evadeChance||60)){
      this._addLog(`Te cubres a tiempo. ¡${this.enemy.name} falla!`);
      this.cameras.main.flash(300,0,80,0);
      this.time.delayedCall(600,()=>this._enemyTurn());
    } else {
      this._addLog('No fue suficiente. El ataque te alcanza de todas formas.');
      special.fn(this);
      this._refreshUI();
      if(STATE.sanity<=0){ STATE.deathCause='insanity'; this._insanityDeath(); return; }
      if(!STATE.isAlive()){ this._checkDeath(); return; }
      this.time.delayedCall(600,()=>this._enemyTurn());
    }
  }

  _flee(){
    if(!this.playerTurn||this.battleOver||this.isBoss) return;
    this.playerTurn=false;
    let sanCost=rnd(10,20);
    STATE.sanity=Math.max(0,STATE.sanity-sanCost); clampSanity();
    SFX.flee();
    if(chance(30)){
      STATE.addLog(`[NV${STATE.level}] HUISTE. -${sanCost} CORDURA.`);
      this._addLog(`Huyes. -${sanCost} SAN.`);
      if(STATE.sanity<=0){ STATE.deathCause='insanity'; this._insanityDeath(); return; }
      STATE.level++;
      this.cameras.main.fadeOut(300,0,0,0);
      this.time.delayedCall(300,()=>this.scene.start('SceneMap'));
    } else {
      this._addLog(`Intentas huir. El enemigo te bloquea. -${sanCost} SAN.`);
      this._refreshUI();
      if(STATE.sanity<=0){ STATE.deathCause='insanity'; this._insanityDeath(); return; }
      this.time.delayedCall(600,()=>this._enemyTurn());
    }
  }

  // ── Enemy turn ─────────────────────────────────────────────────
  _enemyTurn(){
    if(this.battleOver) return;
    if(this.enemyStunned){ this.enemyStunned=false; this._addLog(`${this.enemy.name} aturdido. Pierde su turno.`); this.playerTurn=true; return; }

    // Check for telegraphed special
    let availableSpecials=this.enemy.specialActs.filter(sa=>chance(sa.chance));
    if(availableSpecials.length>0){
      let sa=availableSpecials[0];
      // Check requiredLimb
      if(sa.requiredLimb){
        let ld=this.enemy.limbData[sa.requiredLimb];
        if(ld&&ld.hp<=0){
          // Skip, limb gone
        } else {
          this._telegraphSpecial(sa); return;
        }
      } else {
        this._telegraphSpecial(sa); return;
      }
    }

    // Boss uses special system
    if(this.isBoss&&chance(28)&&!this.pendingSpecial){
      this._telegraphBossSpecial(); return;
    }

    // Normal attack — possibly double attack
    let doubleAttack=chance(18);
    this._doEnemyHit();
    if(doubleAttack && !this.battleOver && STATE.isAlive()){
      this.time.delayedCall(500,()=>{
        if(!this.battleOver) this._doEnemyHit(true);
      });
    }
  }

  _doEnemyHit(isSecond=false){
    if(this.battleOver) return;

    let pen=STATE.getLimbPenalties();
    let evaBonus=STATE.buffs.evasion+pen.eva;
    if(chance(12+evaBonus)){
      this._addLog(`${this.enemy.name} falla${isSecond?' (2º golpe)':''}. Lo esquivas.`);
      if(!isSecond) this.playerTurn=true;
      return;
    }

    let enemyAcc=this.enemy.acc||70;
    if(!chance(enemyAcc)){
      this._addLog(`${this.enemy.name} falla el ataque${isSecond?' (2º)':''}.`);
      if(!isSecond) this.playerTurn=true;
      return;
    }

    // Determine which part to hit based on attackDist
    let target=this._rollEnemyTarget();
    let dmg=rnd(Math.round(this.enemy.att*0.6),this.enemy.att);
    // Reduce dmg if arms lost
    let ld=this.enemy.limbData;
    if(ld.armL&&ld.armR){
      let aLgone=ld.armL.hp<=0, aRgone=ld.armR.hp<=0;
      if(aLgone&&aRgone) dmg=Math.round(dmg*0.45);
      else if(aLgone||aRgone) dmg=Math.round(dmg*0.75);
    }

    // Apply damage to the correct player part
    let part=STATE.parts[target];
    if(!part||part.severed){
      // Hit torso instead
      target='torso';
      part=STATE.parts.torso;
    }

    part.cur=Math.max(0,part.cur-dmg);
    let flash=()=>{
      let pf=this.add.rectangle(600,245,175,220,C.BLOOD,0).setDepth(20);
      this.tweens.add({targets:pf,alpha:{from:0.5,to:0},duration:250});
      SFX.playerTakesHit();
    };

    // Head hit at 0 = instant lethal (no sever needed)
    if(target==='head' && part.cur<=0){
      this._addLog(`${this.enemy.name}${isSecond?' (2º)':''} destruye tu CABEZA. -${dmg}. ¡MUERTE INSTANTÁNEA!`);
      this.cameras.main.shake(800,0.06); this.cameras.main.flash(700,180,0,0);
      flash();
      this._refreshUI();
      this.time.delayedCall(400,()=>this._checkDeath());
      return;
    }

    // Check for sever chance on player limbs (not head/torso)
    if(target!=='torso'&&target!=='head'&&part.cur<=0&&chance(35)){
      part.severed=true;
      SFX.limbLost();
      this._addLog(`${this.enemy.name}${isSecond?' (2º)':''} destroza tu ${partName(target)}! -${dmg}. ¡EXTREMIDAD PERDIDA!`);
      this.cameras.main.shake(600,0.04); this.cameras.main.flash(500,150,0,0);
    } else {
      this._addLog(`${this.enemy.name}${isSecond?' (2º)':''} golpea tu ${partName(target)}. -${dmg}. [${part.cur}/${part.max}]`);
      this.cameras.main.shake(200,0.018); this.cameras.main.flash(150,80,0,0);
    }

    flash();
    if(this.isBoss){ STATE.sanity-=rnd(2,5); clampSanity(); }
    this._refreshUI();

    if(STATE.sanity<=0){ STATE.deathCause='insanity'; this._insanityDeath(); return; }
    if(!STATE.isAlive()){ this._checkDeath(); return; }
    if(!isSecond) this.playerTurn=true;
    else {
      // After second hit
      this.time.delayedCall(300,()=>{
        if(!this.battleOver) this.playerTurn=true;
      });
    }
  }

  _rollEnemyTarget(){
    let dist=this.enemy.attackDist||{torso:60,head:15,armL:8,armR:8,legL:4,legR:5};
    // Filter to only hit existing player parts
    let filtered={};
    let total=0;
    for(let k in dist){
      let p=STATE.parts[k];
      if(p&&!p.severed&&dist[k]>0){ filtered[k]=dist[k]; total+=dist[k]; }
    }
    if(total===0) return 'torso';
    let r=Math.random()*total;
    let acc=0;
    for(let k in filtered){ acc+=filtered[k]; if(r<acc) return k; }
    return 'torso';
  }

  // ── Special telegraph ──────────────────────────────────────────
  _telegraphSpecial(sa){ SFX.enemySpecial();
    this.pendingSpecial=sa;
    this.atkBtn.setVisible(false);
    this.fleeBtn.setVisible(false);
    this.defendBtn.setVisible(true);
    this.telegraphTxt.setText(sa.msg).setVisible(true);
    this.cameras.main.shake(300,0.012); this.cameras.main.flash(600,80,0,0);
    this._addLog(sa.msg);
    this.playerTurn=true;
  }

  // ── Boss specials ──────────────────────────────────────────────
  static get BOSS_SPECIALS(){ return [
    {
      name:'ABRAZO',
      msg:'★ EL INNOMBRABLE EXTIENDE SUS BRAZOS A TU ALREDEDOR. ★  [ DEFENDERSE ]',
      evadeChance:35,
      fn(scene){
        STATE.parts.torso.cur=Math.max(0,STATE.parts.torso.cur-55);
        STATE.parts.armL.severed=true; STATE.parts.armL.cur=0;
        STATE.parts.armR.severed=true; STATE.parts.armR.cur=0;
        scene._addLog('¡TE APLASTA! -55 TORSO. ¡AMBOS BRAZOS PERDIDOS!');
        scene.cameras.main.shake(900,0.06);
      }
    },
    {
      name:'FAUCES',
      msg:'★ EL INNOMBRABLE ABRE SUS FAUCES BAJO TUS PIES. ★  [ DEFENDERSE ]',
      evadeChance:40,
      fn(scene){
        let dmg=rnd(35,50);
        STATE.parts.torso.cur=Math.max(0,STATE.parts.torso.cur-dmg);
        scene._addLog(`¡FAUCES DEL VACÍO! -${dmg} TORSO.`);
        scene.cameras.main.shake(800,0.06);
      }
    },
    {
      name:'GRITO',
      msg:'★ EL INNOMBRABLE INHALA. VA A GRITAR. ★  [ DEFENDERSE ]',
      evadeChance:38,
      fn(scene){
        STATE.sanity-=45; clampSanity();
        let dmg=rnd(20,30);
        STATE.parts.head.cur=Math.max(0,STATE.parts.head.cur-dmg);
        scene._addLog(`¡GRITO PRIMORDIAL! -${dmg} CABEZA. -45 CORDURA.`);
        scene.cameras.main.shake(900,0.06); scene.cameras.main.flash(900,80,0,80);
      }
    },
    {
      name:'DEVOUR',
      msg:'★ EL INNOMBRABLE APUNTA A TU CABEZA CON ALGO QUE NO DEBERÍA EXISTIR. ★  [ DEFENDERSE ]',
      evadeChance:30,
      fn(scene){
        let dmg=rnd(40,55);
        STATE.parts.head.cur=Math.max(0,STATE.parts.head.cur-dmg);
        scene._addLog(`¡DEVORAR! -${dmg} CABEZA. Si llega a 0, mueres.`);
        scene.cameras.main.shake(900,0.07);
      }
    },
    {
      name:'LLUVIA ÁCIDA',
      msg:'★ EL INNOMBRABLE ABRE SUS POROS. LLUVIA ÁCIDA. ★  [ DEFENDERSE ]',
      evadeChance:38,
      fn(scene){
        let dmg=rnd(20,30);
        STATE.parts.torso.cur=Math.max(0,STATE.parts.torso.cur-dmg);
        scene._accDebuff=(scene._accDebuff||0)+22;
        scene._addLog(`¡LLUVIA ÁCIDA! -${dmg} TORSO. -22% Precisión hasta fin del combate.`);
        scene.cameras.main.flash(700,80,50,0);
      }
    },
    {
      name:'TENTÁCULOS',
      msg:'★ EL INNOMBRABLE EXTIENDE DOS TENTÁCULOS. VA A ARRANCARTE LAS PIERNAS. ★  [ DEFENDERSE ]',
      evadeChance:32,
      fn(scene){
        let dmg=rnd(30,45);
        STATE.parts.torso.cur=Math.max(0,STATE.parts.torso.cur-dmg);
        let armsLost=[];
        ['legL','legR'].forEach(k=>{
          if(!STATE.parts[k].severed){ STATE.parts[k].severed=true; STATE.parts[k].cur=0; armsLost.push(partName(k)); }
        });
        scene._addLog(`¡TENTÁCULOS! -${dmg} TORSO. ${armsLost.length?'¡Arranca '+armsLost.join(' y ')+'!':''}`);
        scene.cameras.main.shake(800,0.06);
      }
    },
  ]; }

  _telegraphBossSpecial(){
    let special=SceneBattle.BOSS_SPECIALS[rnd(0,SceneBattle.BOSS_SPECIALS.length-1)];
    this.pendingSpecial=special;
    this.atkBtn.setVisible(false);
    this.fleeBtn.setVisible(false);
    this.defendBtn.setVisible(true);
    this.telegraphTxt.setText(special.msg).setVisible(true);
    this.cameras.main.shake(300,0.012); this.cameras.main.flash(600,80,0,0);
    this._addLog(special.msg);
    this.playerTurn=true;
  }

  // ── Win / Lose ─────────────────────────────────────────────────
  _winBattle(){
    this.battleOver=true;
    this._accDebuff=0;
    let gold=rnd(10,30)*(this.isBoss?3:1);
    STATE.gold+=gold;
    STATE.addLog(`[NV${STATE.level}] VICTORIA vs ${this.enemy.name}. +${gold} Oro.`);
    this._addLog(`${this.enemy.name} CAE. +${gold} Oro.`);

    // Heal on victory — distributed
    let healAmt=rnd(5,12);
    let msgs=STATE.healDistribute(healAmt);
    this._addLog(`Adrenalina. Curación: ${msgs.join(', ')}`);

    let buffRoll=rnd(1,4);
    if(buffRoll===1){ STATE.buffs.damage+=3; this._addLog('La violencia te enseña. +3 Daño permanente.'); }
    else if(buffRoll===2){ STATE.buffs.evasion+=5; this._addLog('Aprendes sus movimientos. +5% Evasión permanente.'); }
    else if(buffRoll===3){
      // Restore some HP to worst part
      let worst=Object.entries(STATE.parts).filter(([k,p])=>!p.severed).sort((a,b)=>(a[1].cur/a[1].max)-(b[1].cur/b[1].max))[0];
      if(worst){ let [k,p]=worst; let gain=Math.min(12,p.max-p.cur); p.cur+=gain; this._addLog(`La adrenalina regenera. +${gain} ${partName(k)}.`); }
    }
    else { let sr=rnd(8,18); STATE.sanity=Math.min(100,STATE.sanity+sr); this._addLog(`Matar algo real calma las voces. +${sr} CORDURA.`); }

    SFX.victory();
    this.cameras.main.flash(500,0,60,0);
    this.time.delayedCall(2200,()=>{ STATE.level++;
      SFX.advance();
      this.cameras.main.fadeOut(400,0,0,0);
      this.time.delayedCall(400,()=>this.scene.start('SceneMap'));
    });
  }

  _checkDeath(){
    if(this.battleOver) return;
    if(!this.coinUsed && !STATE.coinUsed){
      this._triggerDeathDoor();
    } else {
      this._loseBattle();
    }
  }

  _triggerDeathDoor(){
    if(this.battleOver) return;
    this.battleOver=true;
    this._refreshUI();
    this._addLog('★ CAES — LA MUERTE ESPERA. ★');
    this.cameras.main.shake(600,0.04); this.cameras.main.flash(800,150,0,0);

    this.time.delayedCall(900,()=>{
      let dimmer=this.add.rectangle(W/2,H/2,W,H,0x000000,0).setDepth(30);
      this.tweens.add({targets:dimmer,alpha:0.82,duration:500});
      let panel=this.add.rectangle(W/2,290,520,260,0x0a0005,0).setDepth(31);
      this.tweens.add({targets:panel,alpha:1,duration:400,delay:200});

      let title=this.add.text(W/2,180,'— LLEGAS A LAS PUERTAS —',{
        fontFamily:'Cinzel Decorative',fontSize:'22px',color:'#cc0000',
        stroke:'#000',strokeThickness:4,shadow:{color:'#ff0000',blur:20,fill:true}
      }).setOrigin(0.5).setDepth(32).setAlpha(0);
      this.tweens.add({targets:title,alpha:1,duration:600,delay:300});

      let sub=this.add.text(W/2,240,'La muerte te observa.\nTodavía tienes una moneda en el bolsillo.',{
        fontFamily:'Share Tech Mono',fontSize:'14px',color:'#888888',align:'center'
      }).setOrigin(0.5).setDepth(32).setAlpha(0);
      this.tweens.add({targets:sub,alpha:1,duration:600,delay:500});

      let coinBig=this.add.text(W/2,315,'[ ☽  LANZAR LA ÚLTIMA MONEDA  ☽ ]',{
        fontFamily:'Share Tech Mono',fontSize:'16px',color:'#ffaa00',
        stroke:'#110000',strokeThickness:3,
        backgroundColor:'#1a0800',padding:{x:14,y:9}
      }).setOrigin(0.5).setDepth(32).setAlpha(0).setInteractive({useHandCursor:true});
      this.tweens.add({targets:coinBig,alpha:{from:0.3,to:1},duration:500,yoyo:true,repeat:-1,delay:700});
      coinBig.on('pointerover',()=>{coinBig.setColor('#ffffff');coinBig.setScale(1.04);});
      coinBig.on('pointerout', ()=>{coinBig.setColor('#ffaa00');coinBig.setScale(1);});
      coinBig.on('pointerdown',()=>{
        this.tweens.killTweensOf(coinBig);
        dimmer.destroy(); panel.destroy(); title.destroy(); sub.destroy(); coinBig.destroy();
        this.battleOver=false;
        this.coinUsed=true; STATE.coinUsed=true;
        this._executeCoinFlip();
      });
    });
  }

  _executeCoinFlip(){
    this._addLog('★ LANZAS LA ÚLTIMA MONEDA ★');
    this.cameras.main.shake(300,0.015);
    this.time.delayedCall(1000,()=>{
      if(chance(50)){
        // Restore: heal all parts and restore a severed limb
        let msgs=STATE.healDistribute(40);
        this.enemyStunned=true;
        // Restore one severed limb if any
        let severed=Object.entries(STATE.parts).filter(([k,p])=>p.severed&&k!=='head'&&k!=='torso');
        if(severed.length){
          let [k,p]=severed[rnd(0,severed.length-1)];
          p.severed=false; p.cur=Math.ceil(p.max*0.5);
          this._addLog(`CARA — La muerte te escupe. ${msgs.join(', ')}. Recuperas ${partName(k)}. Enemigo aturdido.`);
        } else {
          this._addLog(`CARA — La muerte te escupe. ${msgs.join(', ')}. Enemigo aturdido.`);
        }
        this.cameras.main.flash(700,0,80,0);
        this._refreshUI(); this.playerTurn=true;
      } else {
        // Kill the torso fully
        STATE.parts.torso.cur=0;
        this._addLog('CRUZ — La fortuna te abandona.');
        this.cameras.main.shake(900,0.06); this.cameras.main.flash(900,180,0,0);
        this._refreshUI();
        this.time.delayedCall(1500,()=>this._loseBattle());
      }
    });
  }

  _loseBattle(){ SFX.playerDeath();
    this.battleOver=true;
    STATE.addLog(`[NV${STATE.level}] MUERTO por ${this.enemy.name}.`);
    this._addLog('Caes al suelo. La oscuridad te reclama.');
    this.cameras.main.shake(800,0.05); this.cameras.main.flash(1000,150,0,0);
    this.time.delayedCall(2500,()=>{ this.cameras.main.fadeOut(600,0,0,0);
      this.time.delayedCall(600,()=>this.scene.start('SceneGameOver'));
    });
  }

  _insanityDeath(){ SFX.insanityDeath();
    this.battleOver=true;
    this._addLog('Tu mente se quiebra. Ya eres parte de la oscuridad.');
    this.cameras.main.shake(1000,0.04); this.cameras.main.flash(1000,30,0,40);
    this.time.delayedCall(2800,()=>{ this.cameras.main.fadeOut(600,0,0,0);
      this.time.delayedCall(600,()=>this.scene.start('SceneInsanity'));
    });
  }
}

// ═══════════════════════════════════════════════════════════════
//  SCENE: GAME OVER
// ═══════════════════════════════════════════════════════════════
class SceneGameOver extends Phaser.Scene {
  constructor(){ super('SceneGameOver'); }
  create(){
    SFX.gameOver();
    this.cameras.main.fadeIn(600,0,0,0);
    this.add.rectangle(W/2,H/2,W,H,C.BLACK);
    for(let i=0;i<40;i++) this.add.rectangle(rnd(0,W),rnd(0,H),rnd(1,4),rnd(30,150),C.RED,rnd(3,12)/100);

    this.add.text(W/2,145,'HAS MUERTO',{
      fontFamily:'Cinzel Decorative',fontSize:'68px',color:'#cc0000',
      stroke:'#000',strokeThickness:6,shadow:{color:'#ff0000',blur:40,offsetX:2,offsetY:2,fill:true}
    }).setOrigin(0.5);
    this.add.text(W/2,245,`${PLAYER_NAME} — El descenso fue demasiado.`,{fontFamily:'Share Tech Mono',fontSize:'15px',color:'#555'}).setOrigin(0.5);

    let p=STATE.parts;
    let stats=[
      `Clase: ${PLAYER_CLASS.name}`,
      `Nivel alcanzado: ${STATE.level}`,
      `Torso final: ${p.torso.cur}/${p.torso.max}  Cabeza: ${p.head.severed?'AMPUTADA':p.head.cur+'/'+p.head.max}`,
      `Cordura: ${STATE.sanity}`,
      `Oro acumulado: ${STATE.gold}`,
      `Extremidades perdidas: ${Object.entries(p).filter(([k,v])=>v.severed).length}/4`,
    ];
    stats.forEach((s,i)=>this.add.text(W/2,290+i*22,s,{fontFamily:'Share Tech Mono',fontSize:'13px',color:'#555'}).setOrigin(0.5));

    this.add.text(W/2,440,'— ÚLTIMAS PALABRAS —',{fontFamily:'Share Tech Mono',fontSize:'11px',color:'#2a2a2a'}).setOrigin(0.5);
    STATE.log.slice(0,3).forEach((l,i)=>this.add.text(W/2,454+i*15,'> '+l.slice(0,85),{fontFamily:'Share Tech Mono',fontSize:'10px',color:'#1a1a1a'}).setOrigin(0.5));

    let btn=this.add.text(W/2,548,'[ REINICIAR MAZMORRA ]',{fontFamily:'Share Tech Mono',fontSize:'17px',color:'#cc0000'}).setOrigin(0.5).setInteractive({useHandCursor:true});
    btn.on('pointerover',()=>btn.setColor('#ff4444'));
    btn.on('pointerout', ()=>btn.setColor('#cc0000'));
    btn.on('pointerdown',()=>{ STATE.reset(); this.cameras.main.fadeOut(400,0,0,0); this.time.delayedCall(400,()=>this.scene.start('SceneMenu')); });
    this.tweens.add({targets:btn,alpha:{from:0.3,to:1},duration:900,yoyo:true,repeat:-1});
  }
}

// ═══════════════════════════════════════════════════════════════
//  PHASER CONFIG
// ═══════════════════════════════════════════════════════════════
new Phaser.Game({
  type:Phaser.AUTO, width:W, height:H,
  backgroundColor:'#000000', parent:'game-container',
  scene:[SceneMenu,SceneMap,SceneBattle,SceneEvent,SceneInsanity,SceneGameOver],
  render:{antialias:false,pixelArt:true}
});
</script>
